<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户触达配置</title>
  <style>
    :root {
      --gray-0: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --bg: var(--gray-100);
      --line: var(--gray-200);
      --text: var(--gray-900);
      --muted: var(--gray-500);
      --panel: var(--gray-0);
      --fill: var(--gray-50);
      --fill-strong: var(--gray-200);
      --shadow: 0 8px 24px rgba(15, 23, 42, .1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button { cursor: pointer; }

    [hidden] { display: none !important; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 232px minmax(0, 1fr);
      grid-template-rows: 64px minmax(0, 1fr);
    }

    .topbar {
      grid-column: 1 / -1;
      height: 64px;
      display: grid;
      grid-template-columns: 232px minmax(220px, 260px) minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      padding: 0 20px 0 0;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      z-index: 30;
    }

    .brand {
      height: 64px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: var(--gray-600);
      color: var(--gray-0);
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--gray-800);
      color: var(--gray-0);
      font-weight: 800;
    }

    .platform-name {
      font-size: 16px;
      line-height: 22px;
      font-weight: 700;
    }

    .module-search {
      position: relative;
      min-width: 0;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 10px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .module-search input {
      width: 100%;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-50);
      padding: 0 10px 0 30px;
      color: var(--text);
      outline: none;
    }

    .module-search input:focus {
      background: var(--gray-0);
      border-color: var(--gray-500);
    }

    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: 100%;
      max-height: 220px;
      overflow: auto;
      display: none;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--gray-0);
      box-shadow: var(--shadow);
      z-index: 40;
    }

    .search-results.is-open { display: block; }

    .search-result {
      width: 100%;
      min-height: 42px;
      display: block;
      border: 0;
      border-radius: 6px;
      background: transparent;
      padding: 6px 10px;
      text-align: left;
    }

    .search-result:hover { background: var(--gray-100); }

    .search-result-title {
      display: block;
      color: var(--text);
      font-weight: 700;
    }

    .search-result-path {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .topbar-right {
      display: inline-flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .country-time {
      min-height: 32px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--gray-50);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .user-menu { position: relative; }

    .user-trigger {
      border: 0;
      background: transparent;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
      color: var(--gray-700);
      font: inherit;
    }

    .user-name {
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 650;
    }

    .user-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 148px;
      display: none;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      z-index: 50;
    }

    .user-menu.is-open .user-dropdown { display: block; }

    .drop-item {
      width: 100%;
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--gray-700);
      display: flex;
      align-items: center;
      padding: 0 10px;
      text-align: left;
    }

    .drop-item:hover { background: var(--gray-100); }

    .sidebar {
      grid-column: 1;
      grid-row: 2;
      padding: 16px 12px;
      background: var(--gray-600);
      border-right: 1px solid var(--line);
    }

    .menu-group { margin-bottom: 8px; }

    .menu-title {
      width: 100%;
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      color: var(--text);
      font-weight: 700;
    }

    .menu-arrow {
      color: var(--muted);
      font-size: 12px;
      transition: transform 200ms ease;
    }

    .menu-group.is-collapsed .menu-arrow { transform: rotate(-90deg); }

    .submenu {
      margin-top: 8px;
      padding-left: 12px;
      max-height: 160px;
      opacity: 1;
      overflow: hidden;
      transform: translateY(0);
      transition: max-height 200ms ease, opacity 180ms ease, transform 200ms ease;
    }

    .menu-group.is-collapsed .submenu {
      max-height: 0;
      opacity: 0;
      transform: translateY(-4px);
    }

    .submenu-item {
      width: 100%;
      min-height: 30px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: var(--gray-50);
      text-align: left;
      transition: background 160ms ease, color 160ms ease;
    }

    .submenu-item:hover {
      background: var(--gray-300);
      color: var(--gray-900);
    }

    .submenu-item.is-selected {
      background: var(--gray-200);
      color: var(--text);
      font-weight: 650;
    }

    .main {
      grid-column: 2;
      grid-row: 2;
      min-width: 0;
      padding: 16px;
    }

    .panel {
      min-height: calc(100vh - 96px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: visible;
    }

    .page-tabs {
      min-height: 40px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 6px 10px 0;
      border-bottom: 1px solid var(--line);
      background: var(--gray-50);
      overflow-x: auto;
    }

    .page-tab {
      height: 32px;
      min-width: 92px;
      max-width: 180px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px 6px 0 0;
      background: var(--gray-0);
      color: var(--gray-600);
      padding: 0 8px;
      font-size: 12px;
    }

    .page-tab.is-active {
      background: var(--gray-200);
      color: var(--gray-900);
      font-weight: 700;
    }

    .page-tab-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-tab-close {
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      line-height: 1;
    }

    .breadcrumb {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .breadcrumb-current {
      color: var(--gray-800);
      font-weight: 650;
    }

    .filter-area {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, 256px);
      gap: 16px;
      align-items: end;
    }

    .filter-grid .field.span-2 {
      width: 528px;
      max-width: 100%;
      grid-column: span 2;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--gray-700);
      font-weight: 650;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-50);
      padding: 0 10px;
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 92px;
      padding: 9px 10px;
      line-height: 1.55;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--gray-500);
      background: var(--gray-0);
    }

    input:disabled,
    select:disabled,
    textarea:disabled {
      background: var(--gray-100);
      color: var(--gray-400);
      cursor: not-allowed;
    }

    .toolbar {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .toolbar-left,
    .toolbar-right {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .summary-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .overview-panel {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--gray-50);
      overflow-x: auto;
    }

    .overview-row {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-0);
      overflow: visible;
    }

    .overview-row.has-reward-metrics {
      min-width: 1120px;
    }

    .overview-title {
      margin: 0;
      padding: 12px;
      color: var(--gray-700);
      font-size: 13px;
      line-height: 18px;
      white-space: nowrap;
    }

    .overview-metrics {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      min-width: 0;
    }

    .overview-metrics.has-reward-metrics {
      grid-template-columns: repeat(10, minmax(0, 1fr));
    }

    .overview-metric {
      min-width: 0;
      padding: 8px 6px;
      border-left: 1px solid var(--line);
    }

    .overview-metric-label {
      display: flex;
      align-items: center;
      gap: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 18px;
      white-space: nowrap;
      overflow: visible;
    }

    .overview-metric-label .tip {
      width: 14px;
      height: 14px;
      margin-left: 0;
      font-size: 10px;
      flex: 0 0 14px;
    }

    .overview-metric:last-child .tip:hover::after,
    .overview-metric:last-child .tip:focus::after {
      left: auto;
      right: 0;
    }

    .overview-metric:last-child .tip:hover::before,
    .overview-metric:last-child .tip:focus::before {
      display: none;
    }

    .overview-metric-value {
      margin-top: 2px;
      color: var(--gray-900);
      font-size: 18px;
      line-height: 22px;
      font-weight: 750;
    }

    .btn {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-50);
      color: var(--gray-800);
      padding: 0 12px;
      white-space: nowrap;
    }

    .btn:hover { background: var(--gray-100); }

    .btn.primary {
      background: var(--gray-800);
      border-color: var(--gray-800);
      color: var(--gray-0);
      font-weight: 700;
    }

    .btn.text {
      min-height: 28px;
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--gray-700);
      font-weight: 650;
    }

    .btn.text:hover {
      color: var(--gray-900);
      text-decoration: underline;
    }

    .btn.text.danger { color: var(--gray-600); }

    .table-wrap { overflow: auto; }

    .frontend-preview {
      padding: 20px;
      border-top: 1px solid var(--line);
      background: var(--gray-50);
    }

    .frontend-preview-layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(260px, 360px);
      justify-content: center;
      align-items: start;
      gap: 24px;
    }

    .phone-preview {
      position: relative;
      width: 390px;
      max-width: 100%;
      height: min(760px, calc(100vh - 190px));
      min-height: 620px;
      overflow: hidden;
      border: 8px solid #252827;
      border-radius: 28px;
      background: #101312;
      color: #f7f8f8;
      box-shadow: 0 18px 40px rgba(24, 32, 29, 0.2);
    }

    .phone-screen {
      height: 100%;
      overflow: auto;
      scrollbar-width: none;
      background: #111413;
    }

    .phone-screen::-webkit-scrollbar { display: none; }

    .message-header {
      position: sticky;
      top: 0;
      z-index: 2;
      height: 68px;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      padding: 0 14px;
      background: #1a211e;
      border-bottom: 1px solid #242b28;
    }

    .message-back {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 6px;
      background: #252b29;
      color: #f5f7f6;
      font-size: 30px;
      line-height: 1;
    }

    .message-title {
      text-align: center;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    .message-tabs {
      position: sticky;
      top: 68px;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin: 16px;
      padding: 4px;
      border-radius: 12px;
      background: #202422;
    }

    .message-tab {
      position: relative;
      min-height: 42px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #aeb3b1;
      font-size: 17px;
    }

    .message-tab.is-active {
      background: #333936;
      color: #ffffff;
    }

    .message-badge {
      display: inline-flex;
      min-width: 22px;
      height: 18px;
      align-items: center;
      justify-content: center;
      margin-left: 5px;
      border-radius: 10px;
      background: #ff4e4e;
      color: #fff;
      padding: 0 5px;
      font-size: 11px;
      font-weight: 750;
      vertical-align: 2px;
    }

    .message-list {
      display: grid;
      gap: 12px;
      padding: 0 16px 18px;
    }

    .message-card {
      border: 1px solid #323735;
      border-radius: 12px;
      background: #292c2b;
      padding: 14px 14px 12px;
    }

    .message-time {
      color: #c8ccca;
      font-size: 13px;
      line-height: 18px;
    }

    .message-card-title {
      margin-top: 12px;
      color: #ffffff;
      font-size: 16px;
      line-height: 22px;
      font-weight: 750;
    }

    .message-copy {
      margin-top: 8px;
      color: #858a88;
      font-size: 13px;
      line-height: 19px;
    }

    .message-action {
      width: 100%;
      min-height: 42px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-top: 14px;
      border: 0;
      border-top: 1px solid #383c3a;
      background: transparent;
      color: #15dc83;
      padding: 12px 0 0;
      text-align: left;
      font-size: 16px;
      font-weight: 650;
    }

    .message-action-arrow { font-size: 24px; line-height: 18px; }

    .announcement-card {
      margin: 0 16px;
      border: 1px solid #3b403e;
      border-radius: 8px;
      background: #292d2b;
      padding: 10px 8px 0;
    }

    .announcement-title {
      margin-top: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 750;
    }

    .announcement-copy {
      margin-top: 8px;
      color: #b5bab7;
      font-size: 13px;
      line-height: 19px;
    }

    .announcement-art {
      width: 120px;
      height: 120px;
      display: grid;
      place-items: center;
      margin-top: 8px;
      border-radius: 3px;
      background: #fff;
      overflow: hidden;
    }

    .announcement-art svg {
      width: 106px;
      height: 106px;
    }

    .announcement-extra {
      max-height: 0;
      overflow: hidden;
      color: #8f9592;
      font-size: 12px;
      line-height: 18px;
      transition: max-height 180ms ease, margin-top 180ms ease;
    }

    .announcement-card.is-expanded .announcement-extra {
      max-height: 64px;
      margin-top: 8px;
    }

    .show-all {
      width: 100%;
      min-height: 38px;
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 12px;
    }

    .show-all-arrow {
      display: inline-block;
      margin-left: 5px;
      transition: transform 180ms ease;
    }

    .announcement-card.is-expanded .show-all-arrow { transform: rotate(180deg); }

    .announcement-end {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 18px auto;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .announcement-end::before,
    .announcement-end::after {
      content: "";
      width: 82px;
      height: 1px;
      background: #303533;
    }

    .announcement-modal-layer {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.66);
      padding: 20px;
    }

    .announcement-modal-layer[hidden] { display: none; }

    .announcement-modal-card {
      width: 100%;
      border: 1px solid #3b403e;
      border-radius: 16px;
      background: #232725;
      padding: 16px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }

    .announcement-modal-head {
      display: grid;
      grid-template-columns: 1fr 34px;
      gap: 8px;
      align-items: start;
    }

    .announcement-modal-title {
      color: #fff;
      font-size: 16px;
      font-weight: 750;
    }

    .announcement-modal-time {
      margin-top: 4px;
      color: #7f8783;
      font-size: 12px;
    }

    .announcement-close {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 4px;
      background: #3a403d;
      color: #fff;
      font-size: 26px;
      line-height: 24px;
    }

    .announcement-modal-body {
      margin-top: 14px;
      border-radius: 8px;
      background: #292d2b;
      padding: 12px;
      color: #c4c8c6;
      font-size: 13px;
    }

    .announcement-modal-action {
      width: 100%;
      min-height: 44px;
      margin-top: 14px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(90deg, #23e687, #7be76d);
      color: #07130d;
      font-size: 16px;
      font-weight: 750;
    }

    .reward-modal-layer {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(rgba(2, 9, 5, 0.78), rgba(2, 9, 5, 0.88)),
        radial-gradient(circle at 22% 25%, #1d692f 0 12%, transparent 13%),
        radial-gradient(circle at 75% 32%, #765c11 0 14%, transparent 15%),
        #07120b;
      padding: 28px 20px;
    }

    .reward-modal-layer[hidden] { display: none; }

    .reward-modal-close {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.48);
      color: #fff;
      font-size: 25px;
      line-height: 30px;
    }

    .reward-popup-card {
      position: relative;
      width: 100%;
      max-width: 320px;
      border: 2px solid #fff6a6;
      border-radius: 34px 34px 42px 42px;
      background: linear-gradient(150deg, #fff8a8 0%, #ffe165 50%, #ffc93f 100%);
      padding: 84px 24px 22px;
      color: #e44324;
      text-align: center;
      box-shadow: 0 0 22px rgba(255, 246, 151, 0.9), 0 20px 50px rgba(0, 0, 0, 0.52);
    }

    .reward-popup-card::before {
      content: "🎁";
      position: absolute;
      top: -84px;
      left: 50%;
      width: 190px;
      height: 150px;
      display: grid;
      place-items: center;
      transform: translateX(-50%) rotate(-3deg);
      border-radius: 44% 44% 24% 24%;
      background: linear-gradient(145deg, #fff483, #ffc735);
      font-size: 96px;
      filter: drop-shadow(0 8px 8px rgba(184, 103, 0, 0.35));
    }

    .reward-popup-kicker {
      color: #de6531;
      font-size: 14px;
      font-weight: 750;
    }

    .reward-popup-amount {
      margin-top: 8px;
      color: #f12e28;
      font-size: 30px;
      font-weight: 850;
      letter-spacing: 0.5px;
    }

    .reward-popup-merge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      margin-top: 12px;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.5);
      padding: 4px 12px;
      color: #a95b17;
      font-size: 11px;
      font-weight: 700;
    }

    .reward-receive {
      width: 100%;
      min-height: 48px;
      margin-top: 22px;
      border: 3px solid #fff5b1;
      border-radius: 24px;
      background: linear-gradient(#ff1f12, #ff7415);
      color: #fff;
      font-size: 18px;
      font-weight: 750;
      box-shadow: 0 0 12px rgba(255, 51, 20, 0.75);
    }

    .reward-rule-note {
      border: 1px solid #c7ddff;
      border-radius: 7px;
      background: #f2f7ff;
      padding: 9px 11px;
      color: #4a6282;
      font-size: 12px;
      line-height: 19px;
    }

    .preview-notes {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      padding: 18px;
    }

    .preview-notes h2 {
      margin: 0;
      color: var(--gray-900);
      font-size: 18px;
    }

    .preview-notes p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 20px;
    }

    .preview-source {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .preview-source-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      color: var(--gray-700);
      font-size: 12px;
    }

    .preview-source-row strong { color: var(--gray-900); }

    .frontend-placeholder {
      min-height: 520px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--gray-300);
      border-radius: 12px;
      background: var(--panel);
      color: var(--muted);
      text-align: center;
      padding: 32px;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      font-size: 12px;
    }

    th,
    td {
      height: 42px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 72px;
      max-width: 220px;
    }

    th:last-child,
    td:last-child {
      border-right: 0;
    }

    th:first-child,
    td:first-child {
      width: 56px;
      min-width: 56px;
      max-width: 56px;
      text-align: center;
    }

    th:last-child,
    td:last-child {
      width: 1%;
      min-width: 178px;
      max-width: none;
    }

    th {
      height: 38px;
      background: var(--gray-50);
      color: var(--gray-600);
      font-weight: 700;
    }

    tbody tr:hover { background: var(--gray-50); }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border: 1px solid var(--gray-300);
      border-radius: 999px;
      background: var(--gray-50);
      color: var(--gray-700);
      padding: 0 8px;
      font-size: 12px;
      font-weight: 650;
      margin-right: 4px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border: 1px solid var(--gray-300);
      border-radius: 999px;
      background: var(--gray-100);
      color: var(--gray-800);
      padding: 0 8px;
      font-weight: 650;
    }

    .status-pill.is-disabled {
      background: var(--gray-50);
      color: var(--gray-500);
    }

    .actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .drawer-mask,
    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: flex;
      justify-content: flex-end;
      background: rgba(15, 23, 42, .42);
    }

    .drawer-mask.is-hidden,
    .modal-mask.is-hidden {
      display: none;
    }

    .drawer {
      width: 640px;
      max-width: calc(100vw - 32px);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      box-shadow: -16px 0 36px rgba(15, 23, 42, .18);
    }

    .drawer-head {
      height: 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .drawer-title {
      margin: 0;
      font-size: 15px;
      font-weight: 750;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--gray-600);
      font-size: 18px;
    }

    .icon-btn:hover { background: var(--gray-100); }

    .drawer-body {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    .drawer-foot {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 16px;
      border-top: 1px solid var(--line);
      background: var(--gray-50);
    }

    .section {
      padding-bottom: 18px;
    }

    .section + .section {
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--gray-900);
      font-size: 14px;
      font-weight: 750;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 16px;
      align-items: start;
    }

    .field {
      width: 256px;
      max-width: 100%;
    }

    .field.full {
      grid-column: 1 / -1;
      width: 100%;
    }

    .field.size-2 { grid-column: span 2; }

    .field.full-bleed {
      grid-column: 1 / -1;
      width: 100%;
      max-width: 100%;
    }

    .required { color: var(--gray-900); }

    .tip {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 16px;
      height: 16px;
      margin-left: 4px;
      border: 1px solid var(--gray-300);
      border-radius: 50%;
      color: var(--gray-600);
      background: var(--gray-50);
      font-size: 11px;
      line-height: 1;
      cursor: help;
      vertical-align: text-bottom;
    }

    .tip:hover::after,
    .tip:focus::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 8px);
      bottom: calc(100% + 8px);
      width: max-content;
      max-width: 260px;
      transform: none;
      border-radius: 6px;
      background: var(--gray-900);
      color: var(--gray-0);
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 500;
      line-height: 18px;
      white-space: normal;
      z-index: 200;
      box-shadow: var(--shadow);
    }

    .tip:hover::before,
    .tip:focus::before {
      content: "";
      position: absolute;
      left: calc(100% + 3px);
      bottom: calc(100% + 10px);
      transform: none;
      border: 5px solid transparent;
      border-right-color: var(--gray-900);
      z-index: 201;
    }

    .tip.tip-left:hover::after,
    .tip.tip-left:focus::after {
      right: calc(100% + 8px);
      left: auto;
    }

    .tip.tip-left:hover::before,
    .tip.tip-left:focus::before {
      right: calc(100% + 3px);
      left: auto;
      border-right-color: transparent;
      border-left-color: var(--gray-900);
    }

    .help {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .label-help {
      margin-left: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }

    .radio-line,
    .checkbox-line {
      min-height: 36px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px 16px;
    }

    .radio-line label,
    .checkbox-line label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--gray-700);
      font-weight: 600;
      white-space: nowrap;
    }

    .delivery-check {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      color: var(--gray-700);
      font-weight: 650;
      cursor: pointer;
    }

    .delivery-check input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .delivery-check input:checked + .multi-check {
      border-color: var(--gray-700);
      background: var(--gray-700);
      color: var(--gray-0);
    }

    .delivery-check.is-fixed {
      color: var(--gray-600);
      cursor: default;
    }

    .inline-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .input-count {
      position: relative;
    }

    .input-count input {
      padding-right: 58px;
    }

    .input-count .count {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    .linkage-panel,
    .subsection {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--gray-50);
      padding: 12px;
    }

    .linkage-panel {
      margin-top: 8px;
    }

    .subsection {
      grid-column: 1 / -1;
      width: 100%;
    }

    .subsection + .subsection {
      margin-top: 2px;
    }

    .reward-fields-grid {
      display: contents;
    }

    .subsection-title {
      margin: 0 0 12px;
      color: var(--gray-800);
      font-size: 13px;
      font-weight: 750;
    }

    .popup-config-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 16px;
      align-items: start;
    }

    .asset-upload {
      width: 256px;
      max-width: 100%;
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      min-height: 96px;
      border: 1px dashed var(--gray-300);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--gray-0), var(--gray-50));
      padding: 10px;
    }

    .asset-preview {
      width: 96px;
      height: 72px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-50);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      overflow: hidden;
      align-self: start;
    }

    .asset-preview img {
      width: 100%;
      height: 100%;
      display: none;
      object-fit: cover;
    }

    .asset-upload.has-file .asset-preview img {
      display: block;
    }

    .asset-upload.has-file .asset-placeholder {
      display: none;
    }

    .asset-actions {
      min-width: 0;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .asset-actions input[type="file"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .asset-upload-button {
      width: 88px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-0);
      color: var(--gray-800);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
    }

    .asset-upload-button span {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .asset-upload-button:hover {
      background: var(--gray-100);
    }

    .asset-action-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      min-width: 0;
    }

    .asset-remove-button {
      width: 48px;
      height: 32px;
      flex: 0 0 48px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-0);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .asset-remove-button:not(:disabled):hover {
      color: #dc2626;
      border-color: #fecaca;
      background: #fef2f2;
    }

    .asset-remove-button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .asset-meta-row {
      width: 100%;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-0);
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .asset-file-name {
      display: block;
      width: 100%;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .repeat-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .repeat-panel-head label {
      margin: 0;
      font-weight: 750;
    }

    .condition-box {
      display: grid;
      gap: 8px;
      max-width: 100%;
    }

    .condition-header,
    .condition-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 28px;
      gap: 8px;
      align-items: center;
      max-width: 100%;
    }

    .schedule-time-box {
      display: grid;
      gap: 8px;
      max-width: 100%;
    }

    .schedule-time-header,
    .schedule-time-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 28px;
      gap: 8px;
      align-items: center;
      max-width: 100%;
    }

    .schedule-time-header {
      align-items: end;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .schedule-cycle-column {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .schedule-cycle-column label {
      margin: 0;
      color: var(--gray-700);
      font-weight: 650;
    }

    .schedule-time-row input[disabled] {
      color: var(--text);
      background: #f8fafc;
      opacity: 1;
    }

    .condition-header {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .mini-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-0);
      color: var(--gray-700);
      display: grid;
      place-items: center;
      padding: 0;
    }

    .mini-btn:hover { background: var(--gray-100); }

    .mini-btn:disabled {
      color: var(--gray-400);
      background: var(--gray-50);
      cursor: not-allowed;
      opacity: .72;
    }

    .multi-select {
      position: relative;
      width: 100%;
    }

    .multi-select-trigger {
      width: 100%;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-0);
      color: var(--gray-800);
      padding: 0 10px;
      text-align: left;
      font-weight: 650;
    }

    .multi-select.is-open .multi-select-trigger {
      border-color: var(--gray-500);
      box-shadow: 0 0 0 2px var(--gray-100);
    }

    .multi-select.is-disabled .multi-select-trigger {
      color: var(--gray-400);
      background: var(--gray-100);
      border-color: var(--line);
      box-shadow: none;
      cursor: not-allowed;
    }

    .multi-select.is-disabled .multi-select-arrow {
      color: var(--gray-300);
    }

    .multi-select-arrow {
      color: var(--gray-500);
      font-size: 12px;
    }

    .multi-select-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 220;
      display: none;
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--gray-0);
      box-shadow: var(--shadow);
      padding: 6px;
    }

    .multi-select.is-open .multi-select-menu { display: block; }

    .multi-select-option {
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 6px;
      padding: 0 8px;
      color: var(--gray-700);
      font-weight: 650;
    }

    .multi-select-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .multi-check {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--gray-300);
      border-radius: 4px;
      background: var(--gray-0);
      color: transparent;
      font-size: 12px;
      line-height: 1;
    }

    .multi-select-option input:checked + .multi-check {
      border-color: var(--gray-700);
      background: var(--gray-700);
      color: var(--gray-0);
    }

    .multi-select-option:hover,
    .multi-select-option:has(input:checked) {
      background: var(--gray-100);
      color: var(--gray-900);
    }

    .switch-row {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .switch {
      width: 40px;
      height: 22px;
      border: 1px solid var(--gray-400);
      border-radius: 999px;
      background: var(--gray-200);
      padding: 2px;
    }

    .switch::before {
      content: "";
      display: block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--gray-0);
      transition: transform 180ms ease;
    }

    .switch.is-on {
      background: var(--gray-700);
      border-color: var(--gray-700);
    }

    .switch.is-on::before { transform: translateX(18px); }

    .switch:disabled {
      background: var(--gray-100);
      border-color: var(--gray-300);
      cursor: not-allowed;
      opacity: .8;
    }

    .language-tabs {
      display: flex;
      border: 1px solid var(--line);
      border-bottom: 0;
      background: var(--gray-50);
    }

    .language-tabs button {
      min-width: 92px;
      min-height: 36px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--gray-600);
      font-weight: 650;
    }

    .language-tabs button.is-active {
      background: var(--gray-0);
      color: var(--gray-900);
    }

    .language-panel {
      border: 1px solid var(--line);
      padding: 12px;
    }

    .app-push-config {
      grid-column: 1 / -1;
      width: 100%;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .app-push-config-title {
      margin: 0 0 12px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 750;
    }

    .editor-box {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: var(--gray-0);
    }

    .editor-toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      background: var(--gray-50);
    }

    .editor-toolbar button,
    .editor-toolbar select {
      width: auto;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-0);
      padding: 0 8px;
      color: var(--gray-700);
      font-weight: 650;
    }

    .editor-box textarea {
      border: 0;
      border-radius: 0;
      min-height: 132px;
      background: var(--gray-0);
    }

    .modal-mask {
      justify-content: center;
      align-items: center;
    }

    .modal {
      width: 420px;
      max-width: calc(100vw - 32px);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-head,
    .modal-foot {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .modal-foot {
      justify-content: flex-end;
      gap: 8px;
      border-top: 1px solid var(--line);
      border-bottom: 0;
      background: var(--gray-50);
    }

    .modal-body {
      padding: 16px;
    }

    .modal-body .form-grid {
      grid-template-columns: 1fr;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 120;
      display: none;
      min-width: 220px;
      border-radius: 8px;
      background: var(--gray-900);
      color: var(--gray-0);
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }

    function renderStatsOverview(config, rows) {
      if (!config.overview || !config.detailColumns || !config.detailRows) {
        statsOverview.hidden = true;
        statsOverview.innerHTML = "";
        return;
      }

      const indexOf = (column) => config.detailColumns.indexOf(column);
      const valueAt = (record, column) => {
        const index = indexOf(column);
        return index >= 0 ? String(record[index] ?? "") : "";
      };
      const records = rows.map(({ rowIndex }) => config.detailRows[rowIndex]);
      const uniqueUsers = (predicate) => new Set(records.filter(predicate).map((record) => valueAt(record, "用户ID"))).size;
      const successful = (record) => {
        const directStatus = valueAt(record, "发送状态") || valueAt(record, "状态");
        if (directStatus) return ["成功", "已发送"].includes(directStatus);
        const rowIndex = config.detailRows.indexOf(record);
        const statusColumn = config.columns.indexOf("发送状态") >= 0 ? "发送状态" : "状态";
        const statusIndex = config.columns.indexOf(statusColumn);
        const mainStatus = rowIndex >= 0 && statusIndex >= 0 ? String(config.rows[rowIndex]?.[statusIndex] ?? "") : "";
        return ["成功", "已发送"].includes(mainStatus);
      };
      const contentSent = uniqueUsers(successful);
      const hasRead = (record) => ["已读", "已阅读"].includes(valueAt(record, config.overview.readColumn));
      const hasContentClick = (record) => valueAt(record, config.overview.clickColumn) === "已点击";
      const readCount = uniqueUsers((record) => successful(record) && hasRead(record));
      const contentClick = uniqueUsers((record) => successful(record) && hasContentClick(record));
      const contentConverted = uniqueUsers((record) => successful(record) && (hasRead(record) || hasContentClick(record)));
      const appSent = uniqueUsers((record) => successful(record) && valueAt(record, "触达方式").includes("APP") && valueAt(record, "APP推送状态") === "成功");
      const notificationEnabled = uniqueUsers((record) => successful(record) && valueAt(record, "触达方式").includes("APP") && valueAt(record, "通知权限状态") === "已开启");
      const appClick = uniqueUsers((record) => successful(record) && valueAt(record, "触达方式").includes("APP") && valueAt(record, "APP推送点击状态") === "已点击");
      const rate = (value, total) => total ? `${Math.round((value / total) * 100)}%` : "0%";
      const contentName = config.overview.contentLabel.replace("触达", "");
      const hasRewardMetrics = config.detailColumns.includes("礼金金额");
      const amountValue = (record) => Number(valueAt(record, "礼金金额").replace(/,/g, "")) || 0;
      const rewardIssuedAmount = records.reduce((total, record) => total + (valueAt(record, "是否赠送礼金") === "是" ? amountValue(record) : 0), 0);
      const rewardClaimedAmount = records.reduce((total, record) => total + (valueAt(record, "领取状态") === "已领取" ? amountValue(record) : 0), 0);
      const formatAmount = (value) => value.toLocaleString("en-US");
      const metric = (label, value, tip = "") => `
        <div class="overview-metric">
          <div class="overview-metric-label">${label}${tip ? ` <span class="tip" tabindex="0" data-tip="${tip}">?</span>` : ""}</div>
          <div class="overview-metric-value">${value}</div>
        </div>
      `;

      statsOverview.hidden = false;
      statsOverview.innerHTML = `
        <div class="overview-row${hasRewardMetrics ? " has-reward-metrics" : ""}">
          <h3 class="overview-title">汇总概览 <span class="tip" tabindex="0" data-tip="按当前筛选结果统计，人数按用户ID去重">?</span></h3>
          <div class="overview-metrics${hasRewardMetrics ? " has-reward-metrics" : ""}">
            ${metric("APP推送人数", appSent)}
            ${metric("APP推送开启人数", notificationEnabled)}
            ${metric("APP推送点击人数", appClick)}
            ${metric("APP推送点击率", rate(appClick, appSent), "APP推送点击人数 ÷ APP推送人数")}
            ${metric(`${contentName}推送人数`, contentSent)}
            ${metric(`${contentName}阅读人数`, readCount)}
            ${metric(`${contentName}按钮点击人数`, contentClick)}
            ${metric(`${contentName}转化率`, rate(contentConverted, contentSent), `(${contentName}阅读人数与${contentName}按钮点击人数的用户并集去重) ÷ ${contentName}推送人数`)}
            ${hasRewardMetrics ? metric("礼金发放额", formatAmount(rewardIssuedAmount)) : ""}
            ${hasRewardMetrics ? metric("礼金领取额", formatAmount(rewardClaimedAmount)) : ""}
          </div>
        </div>
      `;
    }

    function renderTable() {
      const config = reachModules[currentModule];
      tableHead.innerHTML = `<tr>${config.columns.map((column) => `<th>${column}</th>`).join("")}</tr>`;
      const filters = readFilters();
      const rows = config.rows.map((row, rowIndex) => ({ row, rowIndex })).filter(({ row, rowIndex }) => {
        const filterRow = config.detailRows ? config.detailRows[rowIndex] : row;
        const filterColumns = config.detailColumns || config.columns;
        const dateFilters = [
          { key: "time", columns: ["修改时间"] },
          { key: "sendTime", columns: ["发送时间", "展示时间"] }
        ];
        for (const item of dateFilters) {
          const index = item.columns.map((column) => filterColumns.indexOf(column)).find((itemIndex) => itemIndex >= 0) ?? -1;
          const start = filters[`${item.key}Start`];
          const end = filters[`${item.key}End`];
          if (index >= 0 && (start || end)) {
            const rowDate = String(filterRow[index]).slice(0, 10).replaceAll("/", "-");
            if (start && rowDate < start) return false;
            if (end && rowDate > end) return false;
          }
        }
        return Object.entries(filters).every(([key, value]) => {
          if (!value || (Array.isArray(value) && !value.length)) return true;
          if (key.endsWith("Start") || key.endsWith("End")) return true;
          const columns = filterColumnMap[key] || [];
          let index = config.columns.findIndex((column) => columns.includes(column));
          let sourceRow = row;
          if (index < 0) {
            index = filterColumns.findIndex((column) => columns.includes(column));
            sourceRow = filterRow;
          }
          if (Array.isArray(value)) {
            if (value.includes("all")) return true;
            if (index < 0) return false;
            const rowValues = String(sourceRow[index]).split("、");
            if (rowValues.includes("all")) return true;
            return value.some((item) => rowValues.includes(item));
          }
          if (index < 0) return filterRow.join(" ").includes(value);
          return String(sourceRow[index]).includes(value);
        });
      });
      renderStatsOverview(config, rows);
      tableBody.innerHTML = rows.map(({ row, rowIndex }) => {
        const cells = row.map((value, index) => {
          if (index === row.length - 1) {
            const disabled = value.includes("停") || value.includes("未启用") ? " is-disabled" : "";
            return `<td><span class="status-pill${disabled}">${value}</span></td>`;
          }
          if (config.columns[index] === "推送状态") {
            const disabled = String(value) === "未推送" ? " is-disabled" : "";
            return `<td><span class="status-pill push-status-pill${disabled}">${value}</span></td>`;
          }
          if (config.columns[index] === "包ID") {
            return `<td>${String(value).split("、").map((item) => `<span class="tag">${item}</span>`).join("")}</td>`;
          }
          if (String(value).includes("APP") || /^(站内信|公告)$/.test(String(value))) {
            return `<td>${String(value).split(/[、-]/).map((item) => `<span class="tag">${item}</span>`).join("")}</td>`;
          }
          return `<td title="${value}">${value}</td>`;
        }).join("");
        const status = row[row.length - 1];
        return `<tr data-row-index="${rowIndex}">${cells}<td>${renderRowActions(status, row, config)}</td></tr>`;
      }).join("");
    }

      const data = {};

        data[control.dataset.filter] = control.value.trim();
      });
      const packageFilter = filterGrid.querySelector("[data-package-filter]");

    function setSwitchState(selector, enabled, textSelector, onText, offText, fieldsSelector = "") {
      const button = form.querySelector(selector);
      if (!button) return;
      button.setAttribute("aria-pressed", String(enabled));
      button.classList.toggle("is-on", enabled);
      const section = button.closest(".section");
      const text = (section || form).querySelector(textSelector);
      if (text) text.textContent = enabled ? onText : offText;
      const fields = fieldsSelector && (section || form).querySelector(fieldsSelector);
      if (fields) fields.hidden = !enabled;
    }

    function setMultiSelectValues(select, values) {
      if (!select) return;
      select.querySelectorAll("[data-multi-option]").forEach((option) => { option.checked = values.includes(option.value); });
      syncMultiSelect(select);
    }

    function fillConditionRows(conditions) {
      const matrix = form.querySelector("[data-condition-matrix]");
      if (!matrix || !conditions.length) return;
      matrix.querySelectorAll(".condition-row").forEach((row, index) => { if (index > 0) row.remove(); });
      while (matrix.querySelectorAll(".condition-row").length < conditions.length) addConditionRow(matrix);
      matrix.querySelectorAll(".condition-row").forEach((row, index) => {
        const condition = conditions[index];
        const type = row.querySelector("[data-condition-type]");
        type.value = condition.type;
        renderConditionRow(row);
        row.querySelectorAll("[data-condition-value] select, [data-condition-value] input, [data-condition-value] textarea")
          .forEach((control, valueIndex) => { control.value = condition.values[valueIndex] || ""; });
      });
      syncConditionMatrix(matrix);
      syncSpecialEventConfigs();
    }

    function fillSchedule(schedule) {
      if (!schedule) return;
      const panel = form.querySelector("[data-schedule-panel]");
      const cycle = panel && panel.querySelector("[data-schedule-cycle]");
      if (!panel || !cycle) return;
      cycle.value = schedule.cycle;
      resetScheduleTimeRows(panel, schedule.cycle);
      while (panel.querySelectorAll(".schedule-time-row").length < schedule.rows.length) addScheduleTimeRow(panel);
      panel.querySelectorAll(".schedule-time-row").forEach((row, index) => {
        const item = schedule.rows[index];
        const primary = row.querySelector("[data-schedule-weekday], [data-schedule-monthday], [data-schedule-date]");
        if (primary) primary.value = item.primary || "";
        row.querySelector("[data-schedule-time]").value = item.time;
      });
    }

                    <label class="delivery-check${isDefault ? " is-fixed" : ""}">

    function renderFrontendDisplay(config) {

        <div class="subsection">

          <div class="form-grid">
            <div class="field full">
              <div class="language-tabs">
                <button class="${currentLanguage === "en" ? "is-active" : ""}" type="button" role="tab" aria-selected="${currentLanguage === "en"}" data-lang="en">英语</button>
                <button class="${currentLanguage === "id" ? "is-active" : ""}" type="button" role="tab" aria-selected="${currentLanguage === "id"}" data-lang="id">印地语</button>
              </div>
              <div class="language-panel">
                <div class="form-grid">
                  ${field(config.contentNameLabel, countedInput(36, "请输入", 'data-language-field="title"'), false, true)}
                  ${config.features.buttonJumpSwitch
                    ? `<div class="field" data-button-text-field hidden><label><span class="required">*</span> 站内信按钮文案</label>${countedInput(36, "请输入", 'data-language-field="buttonText" required')}</div>`
                    : field("跳转按钮文本", countedInput(36, "请输入", 'data-language-field="buttonText"'))}
                  <div class="field full">
                    <label><span class="required">*</span> ${config.contentBodyLabel}</label>
                    <div class="editor-box">
                      <div class="editor-toolbar">
                        <button type="button">B</button>
                        <button type="button">I</button>
                        <button type="button">U</button>
                        <button type="button">链</button>
                        <button type="button">图</button>
                        <select><option>16px</option><option>14px</option><option>18px</option></select>
                        <select><option>1.5</option><option>1.2</option><option>1.8</option></select>
                        <button type="button">清除格式</button>
                      </div>
                      <textarea placeholder="请输入" data-language-field="content"></textarea>

                  <div class="app-push-config" data-app-push-config hidden>
                    <h5 class="app-push-config-title">APP推送配置</h5>
                    <div class="form-grid">
                      ${field("APP推送标题", countedInput(36, "请输入", 'data-language-field="appTitle"'), false, true)}
                      ${field("APP推送内容", countedInput(36, "请输入", 'data-language-field="appContent"'), false, true)}

        <section class="section">
          <h3 class="section-title">前台展示</h3>

    function renderForm(mode = "add") {
      currentDrawerMode = mode;
      const config = reachModules[currentModule];
      const pushOptions = `<option value="">请选择</option>${(config.pushTypeOptions || ["手动推送", "定时推送"]).map((item) => `<option>${item}</option>`).join("")}`;
      const pushType = config.features.pushType
        ? field("推送类型", `<select data-push-type>${pushOptions}</select>`, false, true)
        : "";
      const pushTime = renderScheduleTimes(config);
      const validity = config.features.validity
        ? `${field("生效周期", '<select data-validity-type><option value="">请选择</option><option value="forever">永久有效</option><option value="custom">自定义</option></select>', false, true)}
           ${field('生效时间 <span class="tip" data-tip="选择自定义周期时才需要填写生效时间。">?</span>', '<input type="datetime-local" data-validity-time placeholder="请选择时间" disabled>')}`
        : "";
      const idField = config.features.idField === false ? "" : field(config.idLabel, '<input placeholder="系统自动生成" disabled>');
      const packageId = config.features.packageId
        ? field("包ID", renderPackageIdSelect(), false, true)
        : "";
      form.innerHTML = `
        <section class="section">
          <h3 class="section-title">基本信息</h3>
          <div class="form-grid">
            ${field(config.nameLabel, countedInput(50), false, true)}
            ${idField}
            ${packageId}
            ${pushType}
            ${pushTime}
            ${validity}
          </div>
        </section>
        ${renderMessageConfig(config)}
        ${renderRange(config)}
        ${renderRuleConfig(config)}
        ${renderFrontendDisplay(config)}
      `;
      document.getElementById("drawerTitle").textContent = `${mode === "detail" ? "详情" : mode === "copy" ? "复制新增" : mode === "edit" ? "编辑" : "新增"}${config.name}`;
      syncPushTime();
      syncAllLinkages();
      syncPushRangeDefaults(true);
      syncSystemPushCondition();
      syncInputCounts();
    }

    function syncPushTime() {
      const select = form.querySelector("[data-push-type]");
      const panel = form.querySelector("[data-schedule-panel]");
      if (!select || !panel) return;
      const needTime = select.value.includes("定时");
      panel.hidden = !needTime;
      panel.querySelectorAll("input, select").forEach((control) => {
        control.disabled = !needTime;
        if (!needTime && !control.matches("[data-schedule-cycle]")) control.value = "";
      });
      if (needTime) {
        syncScheduleCycle(panel);
      } else {
        const cycle = panel.querySelector("[data-schedule-cycle]");
        if (cycle) cycle.value = "";
        resetScheduleTimeRows(panel, "");
        panel.querySelectorAll("input, select").forEach((control) => {
          control.disabled = true;
          if (!control.matches("[data-schedule-cycle]")) control.value = "";
        });
      }
    }

    function syncAllLinkages() {
      syncRangePanels();
      syncAppPushConfigState();
      form.querySelectorAll("[data-jump-type]").forEach(syncJumpTarget);
      syncButtonJumpState();
      syncSpecialEventConfigs();
      form.querySelectorAll("[data-scope-type]").forEach(syncScopeValue);
      syncValidityTime();
      form.querySelectorAll(".condition-row").forEach(renderConditionRow);
      form.querySelectorAll("[data-condition-matrix]").forEach(syncConditionMatrix);
    }

    function syncAppPushConfigState(clearWhenDisabled = false) {
      const checkbox = form.querySelector("[data-app-push-checkbox]");
      const panel = form.querySelector("[data-app-push-config]");
      if (!checkbox || !panel) return;
      const enabled = checkbox.checked;
      panel.hidden = !enabled;
      panel.querySelectorAll("input").forEach((input) => {
        input.required = enabled;
      });
      if (enabled || !clearWhenDisabled) return;
      Object.values(languageDrafts).forEach((draft) => {
        draft.appTitle = "";
        draft.appContent = "";
      });
      panel.querySelectorAll('[data-language-field="appTitle"], [data-language-field="appContent"]').forEach((input) => {
        input.value = "";
        syncInputCount(input);
      });
    }

    function validateAppPushConfig() {
      const checkbox = form.querySelector("[data-app-push-checkbox]");
      if (!checkbox || !checkbox.checked) return true;
      saveCurrentLanguageDraft();
      for (const language of ["en", "id"]) {
        const draft = languageDrafts[language];
        if (!draft.appTitle.trim() || !draft.appContent.trim()) {
          switchLanguage(language);
          const languageName = language === "en" ? "英语" : "印地语";
          showToast(`请填写${languageName}APP推送标题和内容`);
          return false;
        }
      }
      return true;
    }

    function syncSystemPushCondition() {
      const pushType = form.querySelector("[data-push-type]");
      const range = form.querySelector("[data-range-type]");
      if (!pushType || !range) return;
      const isSystemPush = pushType.value.includes("系统");
      const rangeField = range.closest(".field");
      const rangeHelp = rangeField && rangeField.querySelector(".label-help");
      if (isSystemPush) {
        const systemLabel = "系统推送";
        range.value = "condition";
        range.disabled = true;
        if (rangeHelp) rangeHelp.textContent = `${systemLabel}按事件触发，默认使用条件用户。`;
      } else {
        range.disabled = false;
        if (rangeHelp) rangeHelp.textContent = "预计推送用户：0人，覆盖率：0%";
      }
      syncRangePanels();
      if (!isSystemPush) return;
      const conditionPanel = form.querySelector('[data-range-panel="condition"]');
      const firstRow = conditionPanel && conditionPanel.querySelector(".condition-row");
      const conditionType = firstRow && firstRow.querySelector("[data-condition-type]");
      if (conditionType) {
        conditionType.value = "事件类型";
        renderConditionRow(firstRow);
      }
    }

    function syncPushRangeDefaults(force = false) {
      const pushType = form.querySelector("[data-push-type]");
      const range = form.querySelector("[data-range-type]");
      if (!pushType || !range) return;
      if (!pushType.value) {
        range.value = "";
      } else if (pushType.value.includes("系统")) {
        range.value = "condition";
      } else if (force || !range.dataset.touched) {
        range.value = pushType.value.includes("定时") ? "all" : "specified";
      }
      syncRangePanels();
      if (!pushType.value.includes("系统")) {
        const firstRow = form.querySelector('[data-range-panel="condition"] .condition-row');
        const conditionType = firstRow && firstRow.querySelector("[data-condition-type]");
        if (conditionType && conditionType.value === "事件类型") {
          conditionType.value = "用户标签";
          renderConditionRow(firstRow);
        }
      }
    }

    function syncRangePanels() {
      const selected = form.querySelector("[data-range-type]");
      if (!selected) return;
      selected.dataset.touched = "true";
      form.querySelectorAll("[data-range-panel]").forEach((panel) => {
        panel.hidden = panel.dataset.rangePanel !== selected.value;
      });
      syncPackageIdByRange();
    }

    function syncPackageIdByRange() {
      const range = form.querySelector("[data-range-type]");
      const packageId = form.querySelector("[data-package-id]");
      if (!range || !packageId) return;
      const disabled = range.value === "specified";
      packageId.dataset.disabled = String(disabled);
      packageId.classList.toggle("is-disabled", disabled);
      packageId.classList.remove("is-open");
      packageId.setAttribute("aria-disabled", String(disabled));
      const trigger = packageId.querySelector("[data-multi-trigger]");
      const required = packageId.closest(".field")?.querySelector(".required");
      packageId.querySelectorAll("[data-multi-option]").forEach((option) => {
        if (disabled) option.checked = false;
        option.disabled = disabled;
      });
      if (trigger) {
        trigger.disabled = disabled;
        trigger.setAttribute("aria-expanded", "false");
      }
      if (required) required.hidden = disabled;
      syncMultiSelect(packageId);
      const value = packageId.querySelector("[data-multi-value]");
      if (value && disabled) value.textContent = "无需配置";
      syncRewardByRange();
    }

    function syncRewardByRange() {
      const range = form.querySelector("[data-range-type]");
      const rewardSwitch = form.querySelector("[data-reward-switch]");
      if (!range || !rewardSwitch) return;
      const blocked = range.value === "all";
      rewardSwitch.disabled = blocked;
      rewardSwitch.setAttribute("aria-disabled", String(blocked));
      const rewardText = form.querySelector("[data-reward-text]");
      const rewardFields = form.querySelector("[data-reward-fields]");
      const popupClaim = form.querySelector("[data-popup-claim-switch]");
      if (!blocked) {
        if (rewardText) rewardText.textContent = rewardSwitch.getAttribute("aria-pressed") === "true" ? "已开启" : "已关闭";
        if (popupClaim) popupClaim.disabled = false;
        syncPopupClaimState(false);
        return;
      }
      rewardSwitch.setAttribute("aria-pressed", "false");
      rewardSwitch.classList.remove("is-on");
      if (rewardText) rewardText.textContent = "不可开启";
      if (rewardFields) {
        rewardFields.hidden = true;
        rewardFields.querySelectorAll('input:not([type="checkbox"])').forEach((input) => { input.value = ""; });
        rewardFields.querySelectorAll("select").forEach((select) => { select.value = ""; });
        const scope = rewardFields.querySelector("[data-scope-type]");
        if (scope) syncScopeValue(scope);
      }
      if (popupClaim) {
        popupClaim.disabled = true;
        popupClaim.setAttribute("aria-pressed", "false");
        popupClaim.classList.remove("is-on");
        const popupClaimText = form.querySelector("[data-popup-claim-text]");
        if (popupClaimText) popupClaimText.textContent = "已关闭";
      }
      syncPopupClaimState();

        const specifiedUsers = form.querySelector('[data-range-panel="specified"] textarea');

      if (rangeType && rangeType.value === "condition") {
        const rows = form.querySelectorAll('[data-range-panel="condition"] .condition-row');
        for (const row of rows) {
          const conditionType = row.querySelector("[data-condition-type]");

      document.getElementById("countryTime").textContent = `UTC+05:30 : ${target.getFullYear()}-${pad(target.getMonth() + 1)}-${pad(target.getDate())} ${pad(target.getHours())}:${pad(target.getMinutes())}:${pad(target.getSeconds())}`;
