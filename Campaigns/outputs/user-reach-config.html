<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户触达配置</title>
  <style>
    :root {
      --gray-0: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --bg: var(--gray-100);
      --line: var(--gray-200);
      --text: var(--gray-900);
      --muted: var(--gray-500);
      --panel: var(--gray-0);
      --fill: var(--gray-50);
      --fill-strong: var(--gray-200);
      --shadow: 0 8px 24px rgba(15, 23, 42, .1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button { cursor: pointer; }

    [hidden] { display: none !important; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 232px minmax(0, 1fr);
      grid-template-rows: 64px minmax(0, 1fr);
    }

    .topbar {
      grid-column: 1 / -1;
      height: 64px;
      display: grid;
      grid-template-columns: 232px minmax(220px, 260px) minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      padding: 0 20px 0 0;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      z-index: 30;
    }

    .brand {
      height: 64px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: var(--gray-600);
      color: var(--gray-0);
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--gray-800);
      color: var(--gray-0);
      font-weight: 800;
    }

    .platform-name {
      font-size: 16px;
      line-height: 22px;
      font-weight: 700;
    }

    .module-search {
      position: relative;
      min-width: 0;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 10px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .module-search input {
      width: 100%;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-50);
      padding: 0 10px 0 30px;
      color: var(--text);
      outline: none;
    }

    .module-search input:focus {
      background: var(--gray-0);
      border-color: var(--gray-500);
    }

    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: 100%;
      max-height: 220px;
      overflow: auto;
      display: none;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--gray-0);
      box-shadow: var(--shadow);
      z-index: 40;
    }

    .search-results.is-open { display: block; }

    .search-result {
      width: 100%;
      min-height: 42px;
      display: block;
      border: 0;
      border-radius: 6px;
      background: transparent;
      padding: 6px 10px;
      text-align: left;
    }

    .search-result:hover { background: var(--gray-100); }

    .search-result-title {
      display: block;
      color: var(--text);
      font-weight: 700;
    }

    .search-result-path {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .topbar-right {
      display: inline-flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .country-time {
      min-height: 32px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--gray-50);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .user-menu { position: relative; }

    .user-trigger {
      border: 0;
      background: transparent;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
      color: var(--gray-700);
      font: inherit;
    }

    .user-name {
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 650;
    }

    .user-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 148px;
      display: none;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      z-index: 50;
    }

    .user-menu.is-open .user-dropdown { display: block; }

    .drop-item {
      width: 100%;
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--gray-700);
      display: flex;
      align-items: center;
      padding: 0 10px;
      text-align: left;
    }

    .drop-item:hover { background: var(--gray-100); }

    .sidebar {
      grid-column: 1;
      grid-row: 2;
      padding: 16px 12px;
      background: var(--gray-600);
      border-right: 1px solid var(--line);
    }

    .menu-group { margin-bottom: 8px; }

    .menu-title {
      width: 100%;
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      color: var(--text);
      font-weight: 700;
    }

    .menu-arrow {
      color: var(--muted);
      font-size: 12px;
      transition: transform 200ms ease;
    }

    .menu-group.is-collapsed .menu-arrow { transform: rotate(-90deg); }

    .submenu {
      margin-top: 8px;
      padding-left: 12px;
      max-height: 160px;
      opacity: 1;
      overflow: hidden;
      transform: translateY(0);
      transition: max-height 200ms ease, opacity 180ms ease, transform 200ms ease;
    }

    .menu-group.is-collapsed .submenu {
      max-height: 0;
      opacity: 0;
      transform: translateY(-4px);
    }

    .submenu-item {
      width: 100%;
      min-height: 30px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: var(--gray-50);
      text-align: left;
      transition: background 160ms ease, color 160ms ease;
    }

    .submenu-item:hover {
      background: var(--gray-300);
      color: var(--gray-900);
    }

    .submenu-item.is-selected {
      background: var(--gray-200);
      color: var(--text);
      font-weight: 650;
    }

    .main {
      grid-column: 2;
      grid-row: 2;
      min-width: 0;
      padding: 16px;
    }

    .panel {
      min-height: calc(100vh - 96px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: visible;
    }

    .page-tabs {
      min-height: 40px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 6px 10px 0;
      border-bottom: 1px solid var(--line);
      background: var(--gray-50);
      overflow-x: auto;
    }

    .page-tab {
      height: 32px;
      min-width: 92px;
      max-width: 180px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px 6px 0 0;
      background: var(--gray-0);
      color: var(--gray-600);
      padding: 0 8px;
      font-size: 12px;
    }

    .page-tab.is-active {
      background: var(--gray-200);
      color: var(--gray-900);
      font-weight: 700;
    }

    .page-tab-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-tab-close {
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      line-height: 1;
    }

    .breadcrumb {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .breadcrumb-current {
      color: var(--gray-800);
      font-weight: 650;
    }

    .filter-area {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, 256px);
      gap: 16px;
      align-items: end;
    }

    .filter-grid .field.span-2 {
      width: 528px;
      max-width: 100%;
      grid-column: span 2;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--gray-700);
      font-weight: 650;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-50);
      padding: 0 10px;
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 92px;
      padding: 9px 10px;
      line-height: 1.55;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--gray-500);
      background: var(--gray-0);
    }

    input:disabled,
    select:disabled,
    textarea:disabled {
      background: var(--gray-100);
      color: var(--gray-400);
      cursor: not-allowed;
    }

    .toolbar {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .toolbar-left,
    .toolbar-right {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .summary-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .overview-panel {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--gray-50);
    }

    .overview-row {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-0);
      overflow: visible;
    }

    .overview-title {
      margin: 0;
      padding: 12px;
      color: var(--gray-700);
      font-size: 13px;
      line-height: 18px;
      white-space: nowrap;
    }

    .overview-metrics {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      min-width: 0;
    }

    .overview-metric {
      min-width: 0;
      padding: 8px 10px;
      border-left: 1px solid var(--line);
    }

    .overview-metric-label {
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
      white-space: nowrap;
      overflow: visible;
    }

    .overview-metric-value {
      margin-top: 2px;
      color: var(--gray-900);
      font-size: 18px;
      line-height: 22px;
      font-weight: 750;
    }

    .btn {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-50);
      color: var(--gray-800);
      padding: 0 12px;
      white-space: nowrap;
    }

    .btn:hover { background: var(--gray-100); }

    .btn.primary {
      background: var(--gray-800);
      border-color: var(--gray-800);
      color: var(--gray-0);
      font-weight: 700;
    }

    .btn.text {
      min-height: 28px;
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--gray-700);
      font-weight: 650;
    }

    .btn.text:hover {
      color: var(--gray-900);
      text-decoration: underline;
    }

    .btn.text.danger { color: var(--gray-600); }

    .table-wrap { overflow: auto; }

    table {
      width: 100%;
      min-width: 1180px;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }

    th,
    td {
      height: 42px;
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th {
      height: 38px;
      background: var(--gray-50);
      color: var(--gray-600);
      font-weight: 700;
    }

    tbody tr:hover { background: var(--gray-50); }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border: 1px solid var(--gray-300);
      border-radius: 999px;
      background: var(--gray-50);
      color: var(--gray-700);
      padding: 0 8px;
      font-size: 12px;
      font-weight: 650;
      margin-right: 4px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border: 1px solid var(--gray-300);
      border-radius: 999px;
      background: var(--gray-100);
      color: var(--gray-800);
      padding: 0 8px;
      font-weight: 650;
    }

    .status-pill.is-disabled {
      background: var(--gray-50);
      color: var(--gray-500);
    }

    .actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .component-note {
      margin: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--gray-50);
      color: var(--gray-600);
      padding: 10px 12px;
      line-height: 1.65;
    }

    .drawer-mask,
    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: flex;
      justify-content: flex-end;
      background: rgba(15, 23, 42, .42);
    }

    .drawer-mask.is-hidden,
    .modal-mask.is-hidden {
      display: none;
    }

    .drawer {
      width: 640px;
      max-width: calc(100vw - 32px);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      box-shadow: -16px 0 36px rgba(15, 23, 42, .18);
    }

    .drawer-head {
      height: 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .drawer-title {
      margin: 0;
      font-size: 15px;
      font-weight: 750;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--gray-600);
      font-size: 18px;
    }

    .icon-btn:hover { background: var(--gray-100); }

    .drawer-body {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    .drawer-foot {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 16px;
      border-top: 1px solid var(--line);
      background: var(--gray-50);
    }

    .section {
      padding-bottom: 18px;
    }

    .section + .section {
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--gray-900);
      font-size: 14px;
      font-weight: 750;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 16px;
      align-items: start;
    }

    .field {
      width: 256px;
      max-width: 100%;
    }

    .field.full {
      grid-column: 1 / -1;
      width: 100%;
    }

    .field.size-2 { grid-column: span 2; }

    .field.full-bleed {
      grid-column: 1 / -1;
      width: 100%;
      max-width: 100%;
    }

    .required { color: var(--gray-900); }

    .tip {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 16px;
      height: 16px;
      margin-left: 4px;
      border: 1px solid var(--gray-300);
      border-radius: 50%;
      color: var(--gray-600);
      background: var(--gray-50);
      font-size: 11px;
      line-height: 1;
      cursor: help;
      vertical-align: text-bottom;
    }

    .tip:hover::after,
    .tip:focus::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 8px);
      bottom: calc(100% + 8px);
      width: max-content;
      max-width: 260px;
      transform: none;
      border-radius: 6px;
      background: var(--gray-900);
      color: var(--gray-0);
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 500;
      line-height: 18px;
      white-space: normal;
      z-index: 200;
      box-shadow: var(--shadow);
    }

    .tip:hover::before,
    .tip:focus::before {
      content: "";
      position: absolute;
      left: calc(100% + 3px);
      bottom: calc(100% + 10px);
      transform: none;
      border: 5px solid transparent;
      border-right-color: var(--gray-900);
      z-index: 201;
    }

    .help {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .label-help {
      margin-left: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .radio-line,
    .checkbox-line {
      min-height: 36px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px 16px;
    }

    .radio-line label,
    .checkbox-line label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--gray-700);
      font-weight: 600;
      white-space: nowrap;
    }

    .inline-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .input-count {
      position: relative;
    }

    .input-count input {
      padding-right: 58px;
    }

    .input-count .count {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    .linkage-panel,
    .subsection {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--gray-50);
      padding: 12px;
    }

    .linkage-panel {
      margin-top: 8px;
    }

    .subsection {
      grid-column: 1 / -1;
      width: 100%;
    }

    .subsection + .subsection {
      margin-top: 2px;
    }

    .reward-fields-grid {
      display: contents;
    }

    .subsection-title {
      margin: 0 0 12px;
      color: var(--gray-800);
      font-size: 13px;
      font-weight: 750;
    }

    .popup-config-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 16px;
      align-items: start;
    }

    .asset-upload {
      width: 256px;
      max-width: 100%;
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      min-height: 96px;
      border: 1px dashed var(--gray-300);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--gray-0), var(--gray-50));
      padding: 10px;
    }

    .asset-preview {
      width: 96px;
      height: 72px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-50);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      overflow: hidden;
      align-self: start;
    }

    .asset-preview img {
      width: 100%;
      height: 100%;
      display: none;
      object-fit: cover;
    }

    .asset-upload.has-file .asset-preview img {
      display: block;
    }

    .asset-upload.has-file .asset-placeholder {
      display: none;
    }

    .asset-actions {
      min-width: 0;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .asset-actions input[type="file"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .asset-upload-button {
      width: 88px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-0);
      color: var(--gray-800);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
    }

    .asset-upload-button span {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .asset-upload-button:hover {
      background: var(--gray-100);
    }

    .asset-action-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      min-width: 0;
    }

    .asset-remove-button {
      width: 48px;
      height: 32px;
      flex: 0 0 48px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--gray-0);
      color: var(--muted);

      border-radius: 6px;
      padding: 0 8px;

    function renderModule(moduleKey) {

      });
      document.getElementById("addBtn").hidden = config.canAdd === false;
      document.getElementById("exportBtn").hidden = config.canAdd !== false;
      renderTabs();
      renderFilters();
      renderTable();

    function renderFilterControl(filter) {

      if (filter.type === "daterange") {
        return `<div class="inline-row"><input type="date" data-filter="${filter.key}Start"><input type="date" data-filter="${filter.key}End"></div>`;
      }
      return `<input data-filter="${filter.key}" placeholder="${filter.placeholder || "请输入"}">`;
    }

    function renderFilters() {
      const config = reachModules[currentModule];
      filterGrid.innerHTML = `

            <label>${filter.label}</label>

          <button class="btn" type="reset" id="resetButton">重置</button>
        </div>
      `;

    function renderStatsOverview(config, rows) {
      if (!config.overview || !config.detailColumns || !config.detailRows) {
        statsOverview.hidden = true;
        statsOverview.innerHTML = "";
        return;
      }

      const indexOf = (column) => config.detailColumns.indexOf(column);
      const valueAt = (record, column) => {
        const index = indexOf(column);
        return index >= 0 ? String(record[index] ?? "") : "";
      };
      const records = rows.map(({ rowIndex }) => config.detailRows[rowIndex]);
      const uniqueUsers = (predicate) => new Set(records.filter(predicate).map((record) => valueAt(record, "用户ID"))).size;
      const successful = (record) => ["成功", "已发送"].includes(valueAt(record, "发送状态") || valueAt(record, "状态"));
      const contentSent = uniqueUsers(successful);
      const readCount = uniqueUsers((record) => successful(record) && ["已读", "已阅读"].includes(valueAt(record, config.overview.readColumn)));
      const contentClick = uniqueUsers((record) => successful(record) && valueAt(record, config.overview.clickColumn) === "已点击");
      const appSent = uniqueUsers((record) => successful(record) && valueAt(record, "触达方式").includes("APP") && valueAt(record, "APP推送状态") === "成功");
      const notificationEnabled = uniqueUsers((record) => successful(record) && valueAt(record, "触达方式").includes("APP") && valueAt(record, "通知权限状态") === "已开启");
      const appClick = uniqueUsers((record) => successful(record) && valueAt(record, "触达方式").includes("APP") && valueAt(record, "APP点击状态") === "已点击");
      const rate = (value, total) => total ? `${Math.round((value / total) * 100)}%` : "0%";
      const metric = (label, value, tip = "") => `
        <div class="overview-metric">
          <div class="overview-metric-label">${label}${tip ? ` <span class="tip" tabindex="0" data-tip="${tip}">?</span>` : ""}</div>
          <div class="overview-metric-value">${value}</div>
        </div>
      `;

      statsOverview.hidden = false;
      statsOverview.innerHTML = `
        <div class="overview-row">
          <h3 class="overview-title">汇总概览 <span class="tip" tabindex="0" data-tip="按当前筛选结果统计，人数按用户ID去重">?</span></h3>
          <div class="overview-metrics">
            ${metric("APP推送成功", appSent)}
            ${metric("开启通知", notificationEnabled)}
            ${metric("APP点击", appClick)}
            ${metric("APP点击率", rate(appClick, appSent), "APP点击人数 ÷ APP推送成功人数")}
            ${metric(`${config.overview.contentLabel.replace("触达", "")}发送`, contentSent)}
            ${metric("阅读人数", readCount)}
            ${metric("按钮点击", contentClick)}
            ${metric("内容点击率", rate(contentClick, contentSent), `按钮点击人数 ÷ ${config.overview.contentLabel.replace("触达", "")}发送成功人数`)}
          </div>
        </div>
      `;
    }

    function renderTable() {
      const config = reachModules[currentModule];
      tableHead.innerHTML = `<tr>${config.columns.map((column) => `<th>${column}</th>`).join("")}</tr>`;
      const filters = readFilters();
      const rows = config.rows.map((row, rowIndex) => ({ row, rowIndex })).filter(({ row, rowIndex }) => {
        const filterRow = config.detailRows ? config.detailRows[rowIndex] : row;
        const filterColumns = config.detailColumns || config.columns;
        const dateFilters = [
          { key: "time", columns: ["修改时间"] },
          { key: "sendTime", columns: ["发送时间", "展示时间"] }
        ];
        for (const item of dateFilters) {
          const index = item.columns.map((column) => filterColumns.indexOf(column)).find((itemIndex) => itemIndex >= 0) ?? -1;
          const start = filters[`${item.key}Start`];
          const end = filters[`${item.key}End`];
          if (index >= 0 && (start || end)) {
            const rowDate = String(filterRow[index]).slice(0, 10).replaceAll("/", "-");
            if (start && rowDate < start) return false;
            if (end && rowDate > end) return false;
          }
        }
        return Object.entries(filters).every(([key, value]) => {
          if (!value) return true;
          if (key.endsWith("Start") || key.endsWith("End")) return true;
          const columns = filterColumnMap[key] || [];
          let index = config.columns.findIndex((column) => columns.includes(column));
          let sourceRow = row;
          if (index < 0) {
            index = filterColumns.findIndex((column) => columns.includes(column));
            sourceRow = filterRow;
          }
          if (index < 0) return filterRow.join(" ").includes(value);
          return String(sourceRow[index]).includes(value);
        });
      });
      renderStatsOverview(config, rows);
      tableBody.innerHTML = rows.map(({ row, rowIndex }) => {
        const cells = row.map((value, index) => {
          if (index === row.length - 1) {
            const disabled = value.includes("停") || value.includes("草稿") ? " is-disabled" : "";
            return `<td><span class="status-pill${disabled}">${value}</span></td>`;
          }
          if (String(value).includes("APP") || /^(站内信|公告)$/.test(String(value))) {
            return `<td>${String(value).split(/[、-]/).map((item) => `<span class="tag">${item}</span>`).join("")}</td>`;
          }
          return `<td title="${value}">${value}</td>`;
        }).join("");
        const status = row[row.length - 1];
        return `<tr data-row-index="${rowIndex}">${cells}<td>${renderRowActions(status)}</td></tr>`;
      }).join("");
    }

    function readFilters() {

        ? field("推送类型", `<select data-push-type>${pushOptions}</select>`, false, true)
        : "";
      const pushTime = renderScheduleTimes(config);
      const validity = config.features.validity
        ? `${field("生效周期", '<select data-validity-type><option value="">请选择</option><option value="forever">永久有效</option><option value="custom">自定义</option></select>', false, true)}
           ${field('生效时间 <span class="tip" data-tip="选择自定义周期时才需要填写生效时间。">?</span>', '<input type="datetime-local" data-validity-time placeholder="请选择时间" disabled>')}`
        : "";
      const idField = config.features.idField === false ? "" : field(config.idLabel, '<input placeholder="系统自动生成" disabled>');
      const packageId = config.features.packageId
        ? field("包ID", '<select data-package-id><option value="">请选择</option><option>IN01</option><option>IN02</option><option>IN03</option></select>', false, true)
        : "";
      form.innerHTML = `
        <section class="section">
          <h3 class="section-title">基本信息</h3>
          <div class="form-grid">
            ${field(config.nameLabel, countedInput(50), false, true)}
            ${idField}
            ${packageId}
            ${pushType}
            ${pushTime}
            ${validity}
          </div>
        </section>
        ${renderMessageConfig(config)}
        ${renderRange(config)}
        ${renderRuleConfig(config)}
        ${renderFrontendDisplay(config)}
      `;
      document.getElementById("drawerTitle").textContent = `${mode === "detail" ? "详情" : mode === "copy" ? "复制" : mode === "edit" ? "编辑" : "新增"}${config.name}`;
      syncPushTime();
      syncAllLinkages();
      syncPushRangeDefaults(true);
      syncSystemPushCondition();
      syncInputCounts();
    }

    function syncPushTime() {
      const select = form.querySelector("[data-push-type]");
      const panel = form.querySelector("[data-schedule-panel]");
      if (!select || !panel) return;
      const needTime = select.value.includes("定时");
      panel.hidden = !needTime;
      panel.querySelectorAll("input, select").forEach((control) => {
        control.disabled = !needTime;
        if (!needTime && !control.matches("[data-schedule-cycle]")) control.value = "";
      });
      if (needTime) {
        syncScheduleCycle(panel);
      } else {
        const cycle = panel.querySelector("[data-schedule-cycle]");
        if (cycle) cycle.value = "";
        resetScheduleTimeRows(panel, "");
        panel.querySelectorAll("input, select").forEach((control) => {
          control.disabled = true;
          if (!control.matches("[data-schedule-cycle]")) control.value = "";
        });
      }
    }

    function syncAllLinkages() {
      syncRangePanels();
      form.querySelectorAll("[data-jump-type]").forEach(syncJumpTarget);
      syncButtonJumpState();
      syncSpecialEventConfigs();
      form.querySelectorAll("[data-scope-type]").forEach(syncScopeValue);
      syncValidityTime();
      form.querySelectorAll(".condition-row").forEach(renderConditionRow);
      form.querySelectorAll("[data-condition-matrix]").forEach(syncConditionMatrix);
    }

    function syncSystemPushCondition() {
      const pushType = form.querySelector("[data-push-type]");
      const range = form.querySelector("[data-range-type]");
      if (!pushType || !range) return;
      const isSystemPush = pushType.value.includes("系统");
      const rangeField = range.closest(".field");
      const rangeHelp = rangeField && rangeField.querySelector(".label-help");
      if (isSystemPush) {
        const systemLabel = pushType.value.includes("公告") ? "系统公告" : "系统推送";
        range.value = "condition";
        range.disabled = true;
        if (rangeHelp) rangeHelp.textContent = `${systemLabel}按事件触发，默认使用条件用户。`;
      } else {
        range.disabled = false;
        if (rangeHelp) rangeHelp.textContent = "预计推送用户：0人，覆盖率：0%";
      }
      syncRangePanels();
      if (!isSystemPush) return;
      const conditionPanel = form.querySelector('[data-range-panel="condition"]');
      const firstRow = conditionPanel && conditionPanel.querySelector(".condition-row");
      const conditionType = firstRow && firstRow.querySelector("[data-condition-type]");
      if (conditionType) {
        conditionType.value = "事件类型";
        renderConditionRow(firstRow);
      }
    }

    function syncPushRangeDefaults(force = false) {
      const pushType = form.querySelector("[data-push-type]");
      const range = form.querySelector("[data-range-type]");
      if (!pushType || !range) return;
      if (!pushType.value) {
        range.value = "";
      } else if (pushType.value.includes("系统")) {
        range.value = "condition";
      } else if (force || !range.dataset.touched) {
        range.value = pushType.value.includes("定时") ? "all" : "specified";
      }
      syncRangePanels();
      if (!pushType.value.includes("系统")) {
        const firstRow = form.querySelector('[data-range-panel="condition"] .condition-row');
        const conditionType = firstRow && firstRow.querySelector("[data-condition-type]");
        if (conditionType && conditionType.value === "事件类型") {
          conditionType.value = "用户标签";
          renderConditionRow(firstRow);
        }
      }
    }

    function syncRangePanels() {
      const selected = form.querySelector("[data-range-type]");
      if (!selected) return;
      selected.dataset.touched = "true";
      form.querySelectorAll("[data-range-panel]").forEach((panel) => {
        panel.hidden = panel.dataset.rangePanel !== selected.value;
      });
    }

    function syncJumpTarget(select) {
      const target = form.querySelector(`[data-jump-target="${select.dataset.jumpScope}"]`);
      if (!target) return;
      const type = select.value;
      target.hidden = !type || type === "none";
      if (!type || type === "none") {
        target.innerHTML = "";
        return;
      }
      const label = select.dataset.jumpScope === "popup" ? "弹窗跳转目标" : "跳转目标";
      const pageOptions = ["充值页", "提现页", "活动中心", "赛事大厅", "奖励列表"];
      const webOptions = ["首页", "任务页", "会员中心", "公告详情"];
      if (type === "page") {
        target.innerHTML = `<label><span class="required">*</span> ${label}</label><select required><option value="">请选择</option>${pageOptions.map((item) => `<option>${item}</option>`).join("")}</select>`;
      } else if (type === "web") {
        target.innerHTML = `<label><span class="required">*</span> ${label}</label><select required><option value="">请选择</option>${webOptions.map((item) => `<option>${item}</option>`).join("")}</select>`;
      } else {
        target.innerHTML = `<label><span class="required">*</span> ${label}</label><input required placeholder="请输入 https:// 开头的外链地址">`;
      }
    }

    function syncButtonJumpState(clearWhenDisabled = false) {
      const button = form.querySelector("[data-button-jump-switch]");
      if (!button) return;
      const enabled = button.getAttribute("aria-pressed") === "true";
      const fields = form.querySelector("[data-button-jump-fields]");
      const buttonTextField = form.querySelector("[data-button-text-field]");
      const statusText = form.querySelector("[data-button-jump-text]");
      if (fields) fields.hidden = !enabled;
      if (buttonTextField) buttonTextField.hidden = !enabled;
      if (statusText) statusText.textContent = enabled ? "已开启" : "已关闭";
      if (enabled || !clearWhenDisabled) return;

      const jumpType = fields && fields.querySelector("[data-jump-type]");
      if (jumpType) {
        jumpType.value = "";
        syncJumpTarget(jumpType);
      }
      Object.values(languageDrafts).forEach((draft) => { draft.buttonText = ""; });
      const buttonText = form.querySelector('[data-language-field="buttonText"]');
      if (buttonText) {
        buttonText.value = "";
        syncInputCount(buttonText);
      }
    }

    function validateButtonJumpConfig() {
      const button = form.querySelector("[data-button-jump-switch]");
      if (!button || button.getAttribute("aria-pressed") !== "true") return true;
      saveCurrentLanguageDraft();
      const missingLanguage = ["en", "id"].find((language) => !languageDrafts[language].buttonText.trim());
      if (missingLanguage) {
        switchLanguage(missingLanguage);
        showToast(`请填写${missingLanguage === "en" ? "英语" : "印地语"}站内信按钮文案`);
        return false;
      }
      const jumpType = form.querySelector('[data-jump-type][data-jump-scope="main"]');
      if (!jumpType || !jumpType.value) {
        showToast("请选择站内信按钮跳转类型");
        return false;
      }
      const targetControl = form.querySelector('[data-jump-target="main"] select, [data-jump-target="main"] input');
      if (!targetControl || !targetControl.value.trim()) {
        showToast("请配置站内信按钮跳转目标");
        return false;
      }
      return true;
    }

    function syncSameDayRechargeConfig() {
      const panel = form.querySelector("[data-same-day-recharge-config]");
      if (!panel) return;
      const pushType = form.querySelector("[data-push-type]");
      const matchedEvent = [...form.querySelectorAll("[data-event-value]")]
        .some((select) => select.value === "新人注册当日充值提醒");
      const visible = Boolean(pushType && pushType.value.includes("系统") && matchedEvent);
      panel.hidden = !visible;
      const input = panel.querySelector("[data-same-day-recharge-delay]");
      if (input) {
        input.disabled = !visible;
        if (!visible) input.value = "";
      }
    }

    function validateSameDayRechargeConfig() {
      const panel = form.querySelector("[data-same-day-recharge-config]");
      if (!panel || panel.hidden) return true;
      const input = panel.querySelector("[data-same-day-recharge-delay]");
      const value = Number(input && input.value);
      if (!input || !Number.isInteger(value) || value < 1) {
        showToast("请输入大于0的注册后未充值提醒分钟数");
        return false;
      }
      return true;
    }

    function syncSportsStartReminderConfig() {
      const panel = form.querySelector("[data-sports-start-reminder-config]");
      if (!panel) return;
      const pushType = form.querySelector("[data-push-type]");
      const matchedEvent = [...form.querySelectorAll("[data-event-value]")]
        .some((select) => select.value === "梦幻体育比赛开始前提醒");
      const visible = Boolean(pushType && pushType.value.includes("系统") && matchedEvent);
      panel.hidden = !visible;
      const input = panel.querySelector("[data-sports-start-reminder-delay]");
      if (input) {
        input.disabled = !visible;
        if (!visible) input.value = "";
      }
    }

    function validateSportsStartReminderConfig() {
      const panel = form.querySelector("[data-sports-start-reminder-config]");
      if (!panel || panel.hidden) return true;
      const input = panel.querySelector("[data-sports-start-reminder-delay]");
      const value = Number(input && input.value);
      if (!input || !Number.isInteger(value) || value < 1) {
        showToast("请输入大于0的比赛开始前提醒分钟数");
        return false;
      }
      return true;
    }

    function syncSpecialEventConfigs() {
      syncSameDayRechargeConfig();
      syncSportsStartReminderConfig();
    }

    function validateLinkageFields() {
      const visible = (control) => Boolean(control && !control.disabled && !control.closest("[hidden]"));
      const requireValue = (control, message) => {
        if (!visible(control) || String(control.value || "").trim()) return true;
        showToast(message);
        return false;
      };

      const pushType = form.querySelector("[data-push-type]");
      if (!requireValue(pushType, "请选择推送类型")) return false;
      const packageId = form.querySelector("[data-package-id]");
      if (!requireValue(packageId, "请选择包ID")) return false;
      const rangeType = form.querySelector("[data-range-type]");
      if (!requireValue(rangeType, "请选择推送范围")) return false;

      if (rangeType && rangeType.value === "specified") {
        const specifiedUsers = form.querySelector('[data-range-panel="specified"] textarea');
        if (!requireValue(specifiedUsers, "请输入指定用户")) return false;
      }
      if (rangeType && rangeType.value === "condition") {
        const rows = form.querySelectorAll('[data-range-panel="condition"] .condition-row');
        for (const row of rows) {
          const conditionType = row.querySelector("[data-condition-type]");
          if (!requireValue(conditionType, "请选择条件类型")) return false;
          for (const control of row.querySelectorAll("[data-condition-value] select, [data-condition-value] input, [data-condition-value] textarea")) {
            if (!requireValue(control, "请完善条件值")) return false;
          }
        }
      }

      const validityType = form.querySelector("[data-validity-type]");
      if (!requireValue(validityType, "请选择生效周期")) return false;
      if (validityType && validityType.value === "custom") {
        if (!requireValue(form.querySelector("[data-validity-time]"), "请选择生效时间")) return false;
      }

      if (pushType && pushType.value.includes("定时")) {
        const cycle = form.querySelector("[data-schedule-cycle]");
        if (!requireValue(cycle, "请选择推送周期")) return false;
        const rows = form.querySelectorAll("[data-schedule-time-list] .schedule-time-row");
        if (!rows.length) {
          showToast("请配置推送时间");
          return false;
        }
        for (const row of rows) {
          for (const control of row.querySelectorAll("select, input")) {
            if (!requireValue(control, "请完善推送时间配置")) return false;
          }
        }
      }

      for (const scopeType of form.querySelectorAll("[data-scope-type]")) {
        if (!requireValue(scopeType, "请选择礼金适用范围")) return false;
        const target = form.querySelector(`[data-scope-value="${scopeType.dataset.scopeTarget}"]`);
        if (visible(scopeType) && scopeType.value && scopeType.value !== "all" && target && !target.hidden) {
          const checked = target.querySelectorAll("[data-multi-option]:checked");
          if (!checked.length) {
            showToast("请选择适用范围值");
            return false;
          }
        }
      }

      for (const jumpType of form.querySelectorAll("[data-jump-type]")) {
        if (!requireValue(jumpType, "请选择跳转类型")) return false;
        if (!visible(jumpType) || !jumpType.value || jumpType.value === "none") continue;
        const target = form.querySelector(`[data-jump-target="${jumpType.dataset.jumpScope}"]`);
        const targetControl = target && target.querySelector("select, input");
        if (!requireValue(targetControl, "请选择或输入跳转目标")) return false;
      }
      return true;
    }

    function syncScopeValue(select) {
      const target = form.querySelector(`[data-scope-value="${select.dataset.scopeTarget}"]`);
      if (!target) return;
      const scopeValues = {
        venue: ["Slot", "Casino", "Fishing", "Fantasy", "Sports"],
        category: ["热门游戏", "新手推荐", "高返奖游戏", "限时活动游戏"],
        game: ["Super Ace", "Fortune Tiger", "Mines", "Aviator", "Teen Patti"]
      };
      const values = scopeValues[select.value] || [];
      target.hidden = values.length === 0;
      if (!values.length) {
        target.innerHTML = "";
        return;
      }
      target.innerHTML = `
        <label><span class="required">*</span> 适用范围值</label>
        <div class="multi-select" data-multi-select data-required-multi>
          <button class="multi-select-trigger" type="button" data-multi-trigger>
            <span data-multi-value>请选择</span>
            <span class="multi-select-arrow">⌄</span>
          </button>
          <div class="multi-select-menu">
            ${values.map((item) => `
              <label class="multi-select-option">
                <input type="checkbox" value="${item}" data-multi-option>
                <span class="multi-check">✓</span>
                <span>${item}</span>
              </label>
            `).join("")}
          </div>
        </div>
      `;
    }

    function syncMultiSelect(select) {
      const checked = [...select.querySelectorAll("[data-multi-option]:checked")].map((item) => item.value);
      const value = select.querySelector("[data-multi-value]");
      if (value) value.textContent = checked.length ? checked.join("、") : "请选择";
    }

    function syncValidityTime() {
      const select = form.querySelector("[data-validity-type]");
      const time = form.querySelector("[data-validity-time]");
      if (!select || !time) return;
      const custom = select.value === "custom";
      const timeField = time.closest(".field");
      if (timeField) timeField.hidden = !custom;
      time.disabled = !custom;
      if (!custom) time.value = "";
    }

    const conditionValueMap = {
      "用户标签": '<select required><option value="">请选择</option><option>新注册用户</option><option>高价值用户</option><option>沉默用户</option><option>风险用户</option></select>',
      "事件类型": '<select required data-event-value><option value="">请选择</option><option>充值成功</option><option>充值失败</option><option>提现成功</option><option>提现失败</option><option>奖励未领取</option><option>新人注册当日充值提醒</option><option>新人未充值每日提醒</option><option>新手任务每日提醒</option><option>梦幻体育每日推送</option><option>梦幻体育比赛开始前提醒</option></select>',
      "VIP等级": '<select required><option value="">请选择</option><option>VIP 1</option><option>VIP 2</option><option>VIP 3</option><option>VIP 4</option></select>',
      "累计充值": '<div class="inline-row"><select required><option value="">请选择</option><option>≥</option><option>&lt;</option><option>介于</option></select><input required placeholder="金额 INR"></div>'
    };

    function renderConditionRow(row) {
      const type = row.querySelector("[data-condition-type]");
      const value = row.querySelector("[data-condition-value]");
      if (!type || !value) return;
      value.innerHTML = type.value ? conditionValueMap[type.value] : "";
      syncSpecialEventConfigs();
    }

    function addConditionRow(matrix) {
      if (!matrix) return;
      const row = matrix.querySelector(".condition-row").cloneNode(true);
      row.querySelector("[data-condition-type]").value = "";
      renderConditionRow(row);
      matrix.appendChild(row);
      syncConditionMatrix(matrix);
      syncSpecialEventConfigs();
    }

    function removeConditionRow(button) {
      const matrix = button.closest("[data-condition-matrix]");
      if (!matrix) return;
      const rows = matrix.querySelectorAll(".condition-row");
      if (rows.length <= 1) {
        showToast("至少保留一条条件");
        syncConditionMatrix(matrix);
        return;
      }
      button.closest(".condition-row").remove();
      syncConditionMatrix(matrix);
      syncSpecialEventConfigs();
    }

    function syncConditionMatrix(matrix) {
      const rows = matrix.querySelectorAll(".condition-row");
      rows.forEach((row) => {
        const button = row.querySelector("[data-remove-condition]");
        if (button) button.disabled = rows.length <= 1;
      });
    }

    function getScheduleCycleConfig(cycle) {
      const configs = {
        daily: { label: "推送周期", primary: '<input type="text" value="每天" disabled data-schedule-daily>' },
        weekly: {
          label: "星期",
          primary: `<select required data-schedule-weekday>
            <option value="">请选择</option>
            <option value="周一">周一</option>
            <option value="周二">周二</option>
            <option value="周三">周三</option>
            <option value="周四">周四</option>
            <option value="周五">周五</option>
            <option value="周六">周六</option>
            <option value="周日">周日</option>
          </select>`
        },
        monthly: {
          label: "日期",
          primary: `<select required data-schedule-monthday>
            <option value="">请选择</option>
            ${Array.from({ length: 31 }, (_, index) => `<option value="${index + 1}号">${index + 1}号</option>`).join("")}
          </select>`
        },
        custom: { label: "指定日期", primary: '<input type="date" required data-schedule-date>' }
      };
      return configs[cycle] || configs.daily;
    }

    function createScheduleTimeRow(cycle) {
      const config = getScheduleCycleConfig(cycle);
      return `
        <div class="schedule-time-row">
          ${config.primary}
          <input type="time" required data-schedule-time>
          <button class="mini-btn" type="button" data-remove-schedule-time aria-label="删除推送时间" title="删除推送时间">−</button>
        </div>
      `;
    }

    function resetScheduleTimeRows(panel, cycle) {
      if (!panel) return;
      const list = panel.querySelector("[data-schedule-time-list]");
      const header = panel.querySelector("[data-schedule-primary-label]");
      if (!list) return;
      list.querySelectorAll(".schedule-time-row").forEach((row) => row.remove());
      list.hidden = !cycle;
      if (!cycle) {
        if (header) header.textContent = "配置项";
        syncScheduleTimeList(list);
        return;
      }
      if (header) header.textContent = getScheduleCycleConfig(cycle).label;
      list.insertAdjacentHTML("beforeend", createScheduleTimeRow(cycle));
      syncScheduleTimeList(list);
    }

    function syncScheduleCycle(panel) {
      if (!panel) return;
      const cycle = panel.querySelector("[data-schedule-cycle]")?.value || "";
      if (!cycle) {
        resetScheduleTimeRows(panel, "");
        return;
      }
      const header = panel.querySelector("[data-schedule-primary-label]");
      if (header) header.textContent = getScheduleCycleConfig(cycle).label;
      const list = panel.querySelector("[data-schedule-time-list]");
      list.hidden = false;
      if (!list.querySelector(".schedule-time-row")) {
        list.insertAdjacentHTML("beforeend", createScheduleTimeRow(cycle));
      }
      syncScheduleTimeList(list);
    }

    function addScheduleTimeRow(panel) {
      if (!panel) return;
      const list = panel.querySelector("[data-schedule-time-list]");
      if (!list) return;
      const cycle = panel.querySelector("[data-schedule-cycle]")?.value || "";
      if (!cycle) {
        showToast("请先选择推送周期");
        return;
      }
      list.insertAdjacentHTML("beforeend", createScheduleTimeRow(cycle));
      syncScheduleTimeList(list);
    }

    function removeScheduleTimeRow(button) {
      const list = button.closest("[data-schedule-time-list]");
      if (!list) return;
      const rows = list.querySelectorAll(".schedule-time-row");
      if (rows.length <= 1) {
        showToast("至少保留一条推送时间");
        syncScheduleTimeList(list);
        return;
      }
      button.closest(".schedule-time-row").remove();
      syncScheduleTimeList(list);
    }

    function syncScheduleTimeList(list) {
      if (!list) return;
      const rows = list.querySelectorAll(".schedule-time-row");
      rows.forEach((row) => {
        const button = row.querySelector("[data-remove-schedule-time]");
        if (button) button.disabled = rows.length <= 1;
      });
    }

    function syncInputCount(input) {
      const wrap = input.closest(".input-count");
      const count = wrap && wrap.querySelector(".count");
      if (!count) return;
      count.textContent = `${input.value.length} / ${input.dataset.countMax}`;
    }

    function syncInputCounts() {
      form.querySelectorAll("[data-count-input]").forEach(syncInputCount);
    }

    function toggleControlledSection(button, textSelector, fieldsSelector, onText, offText) {
      const enabled = button.getAttribute("aria-pressed") !== "true";
      button.setAttribute("aria-pressed", String(enabled));
      button.classList.toggle("is-on", enabled);
      const section = button.closest(".section");
      const text = section.querySelector(textSelector);
      const fields = section.querySelector(fieldsSelector);
      if (text) text.textContent = enabled ? onText : offText;
      if (fields) fields.hidden = !enabled;
    }

    function openDrawer(mode) {
      document.getElementById("confirmBtn").textContent = "确认";
      currentLanguage = "en";
      languageDrafts = createEmptyLanguageDrafts();
      renderForm(mode);
      drawer.classList.remove("is-hidden");
      drawer.setAttribute("aria-hidden", "false");
    }

    function closeDrawer() {
      drawer.classList.add("is-hidden");
      drawer.setAttribute("aria-hidden", "true");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("is-open");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("is-open"), 1800);
    }

    function renderModuleResults() {
      const keyword = searchInput.value.trim();
      const modules = Object.values(reachModules).filter((item) => !keyword || item.name.includes(keyword));
      searchResults.innerHTML = modules.length ? modules.map((item) => `
        <button class="search-result" type="button" data-search-module="${item.key}">
          <span class="search-result-title">${item.name}</span>
          <span class="search-result-path">运营 / 用户触达 / ${item.name}</span>
        </button>
      `).join("") : '<div class="search-result"><span class="search-result-title">无匹配模块</span></div>';
      searchResults.classList.add("is-open");
    }

    function updateClock() {
      const now = new Date();
      const utc = now.getTime() + now.getTimezoneOffset() * 60000;
      const target = new Date(utc + 5.5 * 3600000);
      const pad = (num) => String(num).padStart(2, "0");
      document.getElementById("countryTime").textContent = `UTC+05:30 : ${target.getFullYear()}-${pad(target.getMonth() + 1)}-${pad(target.getDate())} ${pad(target.getHours())}:${pad(target.getMinutes())}:${pad(target.getSeconds())}`;
    }

    document.querySelectorAll("[data-menu-group] .menu-title").forEach((title) => {
      title.addEventListener("click", () => {
        const group = title.closest("[data-menu-group]");
        const willOpen = group.classList.contains("is-collapsed");
        document.querySelectorAll("[data-menu-group]").forEach((item) => {
          item.classList.add("is-collapsed");
          item.querySelector(".menu-title").setAttribute("aria-expanded", "false");
        });
        if (willOpen) {
          group.classList.remove("is-collapsed");
          title.setAttribute("aria-expanded", "true");
        }
      });
    });

    document.getElementById("sideNav").addEventListener("click", (event) => {
      const target = event.target.closest("[data-module]");
      if (!target || !reachModules[target.dataset.module]) return;
      renderModule(target.dataset.module);
    });

    pageTabs.addEventListener("click", (event) => {
      const close = event.target.closest("[data-close-tab]");
      if (close) {
        event.stopPropagation();
        if (openedTabs.length === 1) return;
        const key = close.dataset.closeTab;
        const index = openedTabs.indexOf(key);
        openedTabs.splice(index, 1);
        if (currentModule === key) {
          renderModule(openedTabs[Math.min(index, openedTabs.length - 1)]);
        } else {
          renderTabs();
        }
        return;
      }
      const tab = event.target.closest("[data-tab]");
      if (tab) renderModule(tab.dataset.tab);
    });

    document.getElementById("filters").addEventListener("click", (event) => {
      if (event.target.id === "queryButton") renderTable();
      if (event.target.id === "resetButton") window.setTimeout(renderTable, 0);
    });
    document.getElementById("addBtn").addEventListener("click", () => openDrawer("add"));
    document.getElementById("exportBtn").addEventListener("click", () => showToast(`${reachModules[currentModule].name}已生成导出任务`));

    tableBody.addEventListener("click", (event) => {
      const action = event.target.closest("[data-action]");
      if (!action) return;
      if (action.dataset.action === "delete") {
        pendingDeleteRow = action.closest("tr");
        const deleteText = currentModule.endsWith("Record")
          ? `确认删除当前${reachModules[currentModule].name}？删除后统计列表不再展示。`
          : `确认删除当前${reachModules[currentModule].name}？删除后配置列表不再展示。`;
        document.getElementById("statusModalText").textContent = deleteText;
        document.getElementById("statusConfirmText").textContent = "确认删除";
        document.getElementById("statusModal").classList.remove("is-hidden");
        return;
      }
      if (action.dataset.action === "disable" || action.dataset.action === "enable") {
        pendingStatusButton = action;
        pendingStatusAction = action.dataset.action;
        const isEnable = pendingStatusAction === "enable";
        document.getElementById("statusModalText").textContent = isEnable
          ? "确认启用当前配置？启用后前台可重新命中该配置。"
          : "确认停用当前配置？停用后前台不会继续命中该配置。";
        document.getElementById("statusConfirmText").textContent = isEnable ? "确认启用" : "确认停用";
        document.getElementById("statusModal").classList.remove("is-hidden");
        return;
      }
      if (action.dataset.action === "recordDetail") {
        currentDrawerMode = "recordDetail";
        renderRecordDetail(currentModule, Number(action.closest("tr").dataset.rowIndex || 0));
        document.getElementById("confirmBtn").textContent = "关闭";
        drawer.classList.remove("is-hidden");
        drawer.setAttribute("aria-hidden", "false");
        return;
      }
      openDrawer(action.dataset.action);
    });

    drawer.addEventListener("click", (event) => {
      if (event.target === drawer || event.target.closest("[data-close-drawer]")) closeDrawer();
      const lang = event.target.closest("[data-lang]");
      if (lang) {
        switchLanguage(lang.dataset.lang);
      }
    });

    form.addEventListener("change", (event) => {
      if (event.target.matches("[data-push-type]")) {
        syncPushTime();
        syncPushRangeDefaults(true);
        syncSystemPushCondition();
        syncSpecialEventConfigs();
      }
      if (event.target.matches("[data-schedule-cycle]")) {
        const panel = event.target.closest("[data-schedule-panel]");
        resetScheduleTimeRows(panel, event.target.value);
      }
      if (event.target.matches("[data-maintenance-module]")) syncNoticeAction();
      if (event.target.matches("[data-range-type]")) syncRangePanels();
      if (event.target.matches("[data-jump-type]")) syncJumpTarget(event.target);
      if (event.target.matches("[data-scope-type]")) syncScopeValue(event.target);
      if (event.target.matches("[data-validity-type]")) syncValidityTime();
      if (event.target.matches("[data-condition-type]")) renderConditionRow(event.target.closest(".condition-row"));
      if (event.target.matches("[data-event-value]")) syncSpecialEventConfigs();
      if (event.target.matches("[data-multi-option]")) syncMultiSelect(event.target.closest("[data-multi-select]"));
      if (event.target.matches("[data-asset-file]")) {
        const upload = event.target.closest(".asset-upload");
        const file = event.target.files && event.target.files.length ? event.target.files[0] : null;
        const name = upload.querySelector("[data-asset-file-name]");
        const preview = upload.querySelector("[data-asset-preview]");
        const remove = upload.querySelector("[data-asset-remove]");
        const uploadText = upload.querySelector("[data-asset-upload-text]");
        if (upload.dataset.previewUrl) URL.revokeObjectURL(upload.dataset.previewUrl);
        if (file) {
          upload.dataset.previewUrl = URL.createObjectURL(file);
          preview.src = upload.dataset.previewUrl;
          name.textContent = file.name;
          upload.classList.add("has-file");
          remove.disabled = false;
          uploadText.textContent = "更换图片";
        } else {
          delete upload.dataset.previewUrl;
          preview.removeAttribute("src");
          name.textContent = "未选择图片";
          upload.classList.remove("has-file");
          remove.disabled = true;
          uploadText.textContent = "选择图片";
        }
      }
    });

    form.addEventListener("click", (event) => {
      const removeAsset = event.target.closest("[data-asset-remove]");
      if (!removeAsset) return;
      const upload = removeAsset.closest(".asset-upload");
      const input = upload.querySelector("[data-asset-file]");
      const preview = upload.querySelector("[data-asset-preview]");
      const name = upload.querySelector("[data-asset-file-name]");
      const uploadText = upload.querySelector("[data-asset-upload-text]");
      if (upload.dataset.previewUrl) URL.revokeObjectURL(upload.dataset.previewUrl);
      delete upload.dataset.previewUrl;
      input.value = "";
      preview.removeAttribute("src");
      name.textContent = "未选择图片";
      upload.classList.remove("has-file");
      removeAsset.disabled = true;
      uploadText.textContent = "选择图片";
    });

    form.addEventListener("input", (event) => {
      if (event.target.matches("[data-count-input]")) syncInputCount(event.target);
    });

    form.addEventListener("click", (event) => {
      const buttonJumpSwitch = event.target.closest("[data-button-jump-switch]");
      if (buttonJumpSwitch) {
        const enabled = buttonJumpSwitch.getAttribute("aria-pressed") !== "true";
        buttonJumpSwitch.setAttribute("aria-pressed", String(enabled));
        buttonJumpSwitch.classList.toggle("is-on", enabled);
        syncButtonJumpState(!enabled);
      }
      const popupSwitch = event.target.closest("[data-popup-switch]");
      if (popupSwitch) toggleControlledSection(popupSwitch, "[data-popup-text]", "[data-popup-fields]", "展示", "不展示");
      const rewardSwitch = event.target.closest("[data-reward-switch]");
      if (rewardSwitch) toggleControlledSection(rewardSwitch, "[data-reward-text]", "[data-reward-fields]", "已开启", "已关闭");
      const popupClaimSwitch = event.target.closest("[data-popup-claim-switch]");
      if (popupClaimSwitch) {
        const enabled = popupClaimSwitch.getAttribute("aria-pressed") !== "true";
        popupClaimSwitch.setAttribute("aria-pressed", String(enabled));
        popupClaimSwitch.classList.toggle("is-on", enabled);
        const text = popupClaimSwitch.closest(".switch-row").querySelector("[data-popup-claim-text]");
        if (text) text.textContent = enabled ? "已开启" : "已关闭";
      }
      const appPushSwitch = event.target.closest("[data-app-push-switch]");
      if (appPushSwitch) {
        const enabled = appPushSwitch.getAttribute("aria-pressed") !== "true";
        appPushSwitch.setAttribute("aria-pressed", String(enabled));
        appPushSwitch.classList.toggle("is-on", enabled);
        const text = appPushSwitch.closest(".switch-row").querySelector("[data-app-push-text]");
        if (text) text.textContent = enabled ? "已开启" : "已关闭";
      }
      const addCondition = event.target.closest("[data-add-condition]");
      if (addCondition) {
        const panel = addCondition.closest("[data-range-panel], .repeat-panel");
        addConditionRow(panel && panel.querySelector("[data-condition-matrix]"));
      }
      const removeCondition = event.target.closest("[data-remove-condition]");
      if (removeCondition) removeConditionRow(removeCondition);
      const addScheduleTime = event.target.closest("[data-add-schedule-time]");
      if (addScheduleTime) {
        const panel = addScheduleTime.closest("[data-schedule-panel]");
        addScheduleTimeRow(panel);
      }
      const removeScheduleTime = event.target.closest("[data-remove-schedule-time]");
      if (removeScheduleTime) removeScheduleTimeRow(removeScheduleTime);
      const multiTrigger = event.target.closest("[data-multi-trigger]");
      if (multiTrigger) {
        const select = multiTrigger.closest("[data-multi-select]");
        select.classList.toggle("is-open");
        const arrow = select.querySelector(".multi-select-arrow");
        if (arrow) arrow.textContent = select.classList.contains("is-open") ? "⌃" : "⌄";
      }
    });

    document.getElementById("confirmBtn").addEventListener("click", () => {
      if (currentDrawerMode !== "recordDetail" && !validateLinkageFields()) return;
      if (currentDrawerMode !== "recordDetail" && !validateSameDayRechargeConfig()) return;
      if (currentDrawerMode !== "recordDetail" && !validateSportsStartReminderConfig()) return;
      if (currentDrawerMode !== "recordDetail" && !validateButtonJumpConfig()) return;
      closeDrawer();
      showToast(currentDrawerMode === "recordDetail" ? `${reachModules[currentModule].name}详情已关闭` : `${reachModules[currentModule].name}已保存`);
    });

    searchInput.addEventListener("input", renderModuleResults);
    searchInput.addEventListener("focus", renderModuleResults);
    searchResults.addEventListener("click", (event) => {
      const target = event.target.closest("[data-search-module]");
      if (!target) return;
      document.querySelectorAll("[data-menu-group]").forEach((group) => {
        group.classList.add("is-collapsed");
        group.querySelector(".menu-title").setAttribute("aria-expanded", "false");
      });
      const reachGroup = document.getElementById("sideNav").closest("[data-menu-group]");
      reachGroup.classList.remove("is-collapsed");
      reachGroup.querySelector(".menu-title").setAttribute("aria-expanded", "true");
      renderModule(target.dataset.searchModule);
      searchInput.value = "";
      searchResults.classList.remove("is-open");
    });

    document.getElementById("userTrigger").addEventListener("click", () => {
      document.getElementById("userMenu").classList.toggle("is-open");
    });

    document.querySelectorAll("[data-open-modal]").forEach((button) => {
      button.addEventListener("click", () => {
        document.getElementById("userMenu").classList.remove("is-open");
        document.getElementById(`${button.dataset.openModal}Modal`).classList.remove("is-hidden");
      });
    });

    document.querySelectorAll("[data-close-modal]").forEach((button) => {
      button.addEventListener("click", () => {
        if (!button.matches("[data-confirm-status]") && button.closest("#statusModal")) {
          pendingDeleteRow = null;
          pendingStatusButton = null;
        }
        button.closest(".modal-mask").classList.add("is-hidden");
      });
    });

    document.querySelector("[data-confirm-status]").addEventListener("click", () => {
      if (pendingDeleteRow) {
        pendingDeleteRow.remove();
        pendingDeleteRow = null;
        showToast(`当前${reachModules[currentModule].name}已删除`);
        return;
      }
      if (pendingStatusButton) {
        const row = pendingStatusButton.closest("tr");
        const pill = row && row.querySelector(".status-pill");
        if (pill) {
          const isEnable = pendingStatusAction === "enable";
          pill.textContent = isEnable ? "已启用" : "已停用";
          pill.classList.toggle("is-disabled", !isEnable);
          pendingStatusButton.textContent = isEnable ? "停用" : "启用";
          pendingStatusButton.dataset.action = isEnable ? "disable" : "enable";
        }
      }
      pendingStatusButton = null;
      showToast(pendingStatusAction === "enable" ? "当前配置已启用" : "当前配置已停用");
    });

    document.querySelectorAll(".modal-mask").forEach((mask) => {
      mask.addEventListener("click", (event) => {
        if (event.target === mask) mask.classList.add("is-hidden");
      });
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".module-search")) searchResults.classList.remove("is-open");
      if (!event.target.closest(".user-menu")) document.getElementById("userMenu").classList.remove("is-open");
      if (!event.target.closest("[data-multi-select]")) {
        document.querySelectorAll("[data-multi-select].is-open").forEach((select) => {
          select.classList.remove("is-open");
          const arrow = select.querySelector(".multi-select-arrow");
          if (arrow) arrow.textContent = "⌄";
        });
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      closeDrawer();
      searchResults.classList.remove("is-open");
      document.querySelectorAll(".modal-mask").forEach((mask) => mask.classList.add("is-hidden"));
    });

    updateClock();
    window.setInterval(updateClock, 1000);
    renderModule(currentModule);
  </script>
</body>
</html>
